<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Work Order Bag — No-Sketch Variants</title>
  <!--
    ══════════════════════════════════════════════════════════════
    Reached via Print Setup → Custom Order Bag → "Rings/Repair/Compact
    (beta)" — see printOrderVariantBag() in js/orders.js, which builds
    the query string below and auto-picks ?variant= per order (repair
    kind → repair, has rings[] → rings, else → compact).
    Same freeform visual language as custom-sketch-print.html
    (Calibri, uppercase micro-labels, 5.5"×8.5" bag rotated 90° CW
    onto the top half of a letter sheet) but with the center
    "Design Sketch" canvas replaced by three alternate center
    blocks, picked with ?variant=:

      ?variant=rings    Custom order, ring-heavy — center block is a
                         card grid, one card per ring, built from the
                         same rings[] shape as js/ring-fields.js
                         (Meditation Ring / Simple Band / Custom Ring).
      ?variant=repair   Repair order — center block is a bench
                         checklist (issue tags, warranty) + a wide
                         ruled area for repair instructions.
      ?variant=compact  Everything else (resize, estimate, simple
                         custom with no sketch) — no special center
                         block at all; Bench Notes/Materials just
                         grows to fill the space.

    ?demo=1..5 loads canned data per variant (see DEMOS below) so
    every combination can be reviewed with no app needed. The bar
    at the top (screen only) links every variant × demo combo.
    ══════════════════════════════════════════════════════════════
  -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Calibri, Arial, sans-serif; color: #111; background: #fff; }

    .form-content {
      width: 5.5in; height: 8.5in;
      padding: 0.17in 0.19in 0.15in;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    @media screen {
      body { background: #666; padding: 24px; }
      .screen-note { font-family: Arial, sans-serif; font-size: 12px; color: #fff;
                     text-align: center; margin-bottom: 10px; max-width: 5.5in; margin-left: auto; margin-right: auto; }
      .form-content { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.5); margin: 0 auto; }
      .print-bar { text-align: center; margin-bottom: 10px; }
      .print-btn { background: #7A5C3A; color: #fff; border: none; padding: 8px 22px;
                   font-size: 13px; border-radius: 5px; cursor: pointer; font-family: inherit; }
      .print-btn:hover { background: #5e4428; }
    }

    @media print {
      body { margin: 0; padding: 0; background: #fff; }
      .no-print { display: none !important; }
      @page { size: 8.5in 11in portrait; margin: 0; }
      .form-content {
        position: absolute; top: -1.5in; left: 1.5in;
        transform: rotate(90deg); transform-origin: center;
      }
    }

    /* ── Shared bits (identical to custom-sketch-print.html) ── */
    .lbl { font-size: 7.5px; font-weight: bold; letter-spacing: 1.8px;
           text-transform: uppercase; color: #555; }
    .bx { display: inline-block; width: 11px; height: 11px; border: 1.2px solid #333;
          vertical-align: -2px; cursor: pointer; }
    .bx.checked { background: #333; }
    .ck { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; }
    [contenteditable] { outline: none; cursor: text; }
    [contenteditable]:hover, [contenteditable]:focus { background: #fffbe6; }
    @media print { [contenteditable]:hover, [contenteditable]:focus { background: transparent !important; } }

    /* ── Header ── */
    .top { display: flex; justify-content: space-between; align-items: baseline;
           padding-bottom: 7px; border-bottom: 1px solid #111; }
    .top b { font-size: 15px; }
    .grid3 { display: flex; border-bottom: 1px solid #111; }
    .g { flex: 1; padding: 6px 10px 7px 0; min-width: 0; }
    .g + .g { border-left: 1px solid #ccc; padding-left: 10px; }
    .g .v { display: block; font-size: 13px; font-weight: bold; margin-top: 1px; }
    .g .sub { font-size: 10.5px; color: #333; margin-top: 1px; line-height: 1.3; }
    .g.cust { flex: 1.35; }

    /* ── Gift strip (conditional) ── */
    .gift { display: none; border: 1.5px solid #111; margin-top: 7px;
            padding: 4px 10px; font-size: 11.5px; align-items: center; gap: 8px; }
    .gift.show { display: flex; }
    .gift b { font-size: 11.5px; }
    .gift .sup { margin-left: auto; font-weight: bold; white-space: nowrap; }

    /* ── Job block ── */
    .jobline { padding: 8px 0 2px; }
    .jobline .pt { margin-bottom: 1px; }
    .jobline .t { font-size: 14px; font-weight: bold; }
    .jobline .d { font-size: 12px; line-height: 1.35; margin-top: 2px; }
    .jobline .kvline { font-size: 11px; margin-top: 3px; display: none; }
    .jobline .kvline.show { display: block; }
    .jobline .kvline .lbl { margin-right: 5px; }

    /* ── CENTER BLOCK: shared frame every variant renders into ── */
    .center { flex: 1; margin-top: 6px; min-height: 1.6in; overflow: hidden; }

    /* ── Variant: rings — card grid, one per ring ── */
    .rings-grid { display: grid; gap: 6px; height: 100%; grid-auto-rows: 1fr; }
    /* Ring cards no longer stretch to fill the page (see .center override
       below), so this spacer soaks up the freed vertical space instead,
       anchoring items/money strip/footer back down at the bottom of the
       bag rather than letting them cluster right under the cards. Only
       active in rings mode — repair/compact already have their own
       flex:1 filler (repair box / grown notes). */
    .bottom-spacer { flex: none; }
    body[data-variant="rings"] .bottom-spacer { flex: 1; }
    /* rings variant: unlike repair's box (which should fill whatever
       vertical space Bench Notes isn't using anymore), the ring cards
       should size to their own square content instead of stretching to
       swallow it, so items/money strip sit right underneath. */
    body[data-variant="rings"] .center { flex: none; min-height: 0; }
    body[data-variant="rings"] .rings-grid { height: auto; }
    .rings-grid.n1 { grid-template-columns: 1fr; }
    .rings-grid.n2 { grid-template-columns: 1fr 1fr; }
    .rings-grid.n3 { grid-template-columns: 1fr 1fr; }
    .rings-grid.n4 { grid-template-columns: 1fr 1fr; }
    .rings-grid.nmany { grid-template-columns: 1fr 1fr 1fr; }
    .ring-card { border: 1px solid #999; border-radius: 3px; padding: 6px 8px;
                 display: flex; flex-direction: column; min-height: 0; overflow: hidden;
                 aspect-ratio: 1 / 1; width: 100%; }
    .ring-card .rc-head { display: flex; justify-content: space-between; align-items: baseline;
                           border-bottom: 1px solid #ddd; padding-bottom: 3px; margin-bottom: 4px; }
    .ring-card .rc-name { font-size: 12.5px; font-weight: bold; }
    .ring-card .rc-type { font-size: 8.5px; color: #666; }
    .ring-card .rc-size { font-size: 17px; font-weight: bold; background: #f2f2f2;
                           border: 1px solid #ccc; padding: 1px 7px; border-radius: 3px; }
    .rings-grid.n1 .ring-card .rc-size { font-size: 24px; }
    .ring-card .rc-body { flex: 1; font-size: 10.5px; line-height: 1.5; }
    .rings-grid.n1 .ring-card .rc-body { font-size: 13px; line-height: 1.7; }
    .ring-card .rc-row { display: flex; gap: 4px; }
    .ring-card .rc-row .k { color: #666; min-width: 52px; flex-shrink: 0; }
    .ring-card .rc-row .v { font-weight: 600; }
    .ring-card .rc-stamp { margin-top: auto; padding-top: 4px; border-top: 1px dashed #ccc;
                            font-size: 10px; font-style: italic; color: #333; }
    .rings-grid.n1 .ring-card .rc-stamp { font-size: 12px; }

    /* ── Variant: repair — checklist + wide ruled instructions ── */
    .repair-box { border: 1px solid #111; height: 100%; display: flex; flex-direction: column; }
    .repair-box .rb-head { background: #eee; border-bottom: 1px solid #111; padding: 3px 8px; }
    .repair-issues { display: flex; flex-wrap: wrap; gap: 3px 0; padding: 6px 8px; border-bottom: 1px solid #ccc; }
    .repair-issues .ck { flex: 1 0 46%; padding: 2px 0; }
    .repair-warranty { display: flex; align-items: center; gap: 6px; padding: 5px 8px;
                        border-bottom: 1px solid #ccc; font-size: 10.5px; }
    .repair-instr { flex: 1; padding: 6px 8px; display: flex; flex-direction: column; min-height: 0; }
    .repair-instr .lbl { margin-bottom: 3px; }
    .repair-instr .txt { font-size: 12px; line-height: 1.4; white-space: pre-wrap; }
    .repair-instr .rule { border-bottom: 1px solid #ccc; flex: 1; min-height: 14px; }

    /* ── Variant: compact — no center block at all; notes absorbs the space ── */
    .center.compact-empty { display: none; }

    /* ── Bench notes ── */
    .notes { margin-top: 8px; }
    .notes .mat { font-size: 11.5px; margin-top: 2px; white-space: pre-wrap; }
    .notes .rule { border-bottom: 1px solid #bbb; height: 24px; }
    /* compact variant: notes grows to fill the vacated center space */
    body[data-variant="compact"] .notes { flex: 1; display: flex; flex-direction: column; margin-top: 6px; }
    body[data-variant="compact"] .notes .rule { flex: 1; height: auto; min-height: 20px; }
    /* rings variant (3-Ring Family): each card already shows its own specs —
       Bench Notes/Materials would just repeat it, so drop the box entirely. */
    body[data-variant="rings"] .notes { display: none; }

    /* ── Items + money strip ── */
    .items { margin-top: 8px; display: none; }
    .items.show { display: block; }
    .items .ir { display: flex; justify-content: space-between; font-size: 11.5px;
                 padding: 2px 2px; border-bottom: 1px solid #e2e2e2; }
    .moneystrip { display: flex; margin-top: 8px; border: 1px solid #111; }
    .m { flex: 1; text-align: center; padding: 5px 4px 6px; font-size: 12.5px; min-width: 0; }
    .m + .m { border-left: 1px solid #ccc; }
    .m small { display: block; font-size: 7px; font-weight: bold; letter-spacing: 1.4px;
               text-transform: uppercase; color: #555; margin-bottom: 2px; }
    .m.b { font-weight: bold; }
    .m.hide { display: none; }

    /* ── Footer ── */
    .foot { display: flex; gap: 18px; align-items: center; margin-top: 8px; }
    .foot .url { margin-left: auto; }

    /* Preview mode (?preview=1): fill the iframe cleanly — no grey backdrop,
       no in-iframe Print button (the bag-style picker has its own). */
    @media screen {
      body.preview { background: #fff; padding: 0; }
      body.preview .print-bar, body.preview .screen-note { display: none; }
    }

    /* ── Bag QR — deep-links to the order in the app ── */
    .top-right { display: flex; align-items: center; gap: 6px; }
    .bag-qr { width: 0.5in; height: 0.5in; flex-shrink: 0; }
    .bag-qr svg { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>

<div class="print-bar no-print">
  <button class="print-btn" onclick="window.print()">🖨 Print Work Order</button>
</div>

<div class="form-content">

  <div class="top">
    <b>Stones Throw Studio</b>
    <div class="top-right">
      <span class="lbl" id="kind-lbl">Custom Order</span>
      <div class="bag-qr" id="bag-qr"></div>
    </div>
  </div>

  <div class="grid3">
    <div class="g cust">
      <span class="lbl">Customer</span>
      <span class="v" id="c-name" contenteditable="true"></span>
      <div class="sub" id="c-contact" contenteditable="true"></div>
      <div class="sub" id="c-addr" contenteditable="true" style="display:none;"></div>
    </div>
    <div class="g">
      <span class="lbl">Taken In</span>
      <span class="v" id="d-takein" contenteditable="true"></span>
    </div>
    <div class="g">
      <span class="lbl">Due</span>
      <span class="v" id="d-due" contenteditable="true"></span>
      <div class="sub" id="d-pickup" contenteditable="true"></div>
    </div>
  </div>

  <div class="gift" id="gift">
    <span>🎁</span><b id="gift-for" contenteditable="true"></b>
    <span id="gift-date" contenteditable="true"></span>
    <span class="sup" id="gift-surprise" style="display:none;">🤫 SURPRISE — discretion at pickup</span>
  </div>

  <div class="jobline">
    <div class="lbl pt" id="j-piece"></div>
    <div class="t" id="j-title" contenteditable="true"></div>
    <div class="d" id="j-desc" contenteditable="true"></div>
    <div class="kvline" id="j-stones-row"><span class="lbl">Stones</span><span id="j-stones" contenteditable="true"></span></div>
    <div class="kvline" id="j-finish-row"><span class="lbl">Finish</span><span id="j-finish" contenteditable="true"></span></div>
    <div class="kvline" id="j-cnotes-row"><span class="lbl">Customer Notes</span><span id="j-cnotes" contenteditable="true"></span></div>
  </div>

  <!-- CENTER: populated by variant-specific render function -->
  <div class="center" id="center"></div>

  <div class="bottom-spacer"></div>

  <div class="notes">
    <span class="lbl">Bench Notes / Materials</span>
    <div class="mat" id="n-materials" contenteditable="true" style="display:none;"></div>
    <div class="rule"></div>
    <div class="rule"></div>
  </div>

  <div class="items" id="items"></div>

  <div class="moneystrip">
    <div class="m"><small>Subtotal</small><span id="m-sub" contenteditable="true"></span></div>
    <div class="m"><small>Tax 8%</small><span id="m-tax" contenteditable="true"></span></div>
    <div class="m hide" id="m-ship-cell"><small>Shipping</small><span id="m-ship" contenteditable="true"></span></div>
    <div class="m b"><small>Total</small><span id="m-total"></span></div>
    <div class="m"><small>Deposit</small><span id="m-dep" contenteditable="true"></span></div>
    <div class="m b"><small>Balance</small><span id="m-bal"></span></div>
  </div>

  <div class="foot">
    <span class="lbl">Paid By</span>
    <span class="ck"><span class="bx" id="pb-cash"></span>Cash</span>
    <span class="ck"><span class="bx" id="pb-credit"></span>Credit</span>
    <span class="ck"><span class="bx" id="pb-check"></span>Check</span>
    <span class="lbl url">stonesthrowjewelry.com</span>
  </div>

</div>

<script src="js/qrcode-lib.js"></script>
<script>
  function fmt(d) {
    if (!d) return '';
    const p = String(d).split('-');
    return p.length === 3 ? p[1] + '/' + p[2] + '/' + p[0] : d;
  }
  function money(v) {
    const n = parseFloat(v);
    return isNaN(n) ? '' : '$' + n.toFixed(2);
  }

  const q = new URLSearchParams(window.location.search);
  if (q.get('preview')) document.body.classList.add('preview');
  const variant = ['rings', 'repair', 'compact'].includes(q.get('variant')) ? q.get('variant') : 'rings';
  const demo = q.get('demo');
  document.body.dataset.variant = variant;
  if (typeof stsBagQR === 'function') stsBagQR(document.getElementById('bag-qr'), q.get('orderId') || (demo ? 'demo-' + demo : ''));

  // ── Demo orders — one per variant, showing different ring-combo /
  // order-kind data the Intake app can actually produce. ──
  const DEMOS = {
    // variant=rings, single Custom Ring
    '1': {
      kindLbl: 'Custom Order', name: 'Walk-in Wanda', phone: '(512) 555-1234', email: 'wanda@example.com',
      takeIn: '2026-07-10', deadline: '2026-08-01', pickup: 'Studio',
      pieceType: 'Ring', jobTitle: 'Custom Stacking Ring',
      desc: 'Simple stacking ring, brushed finish, to pair with her existing pieces.',
      rings: [{ category: 'Custom Ring', customMetal: '14k yellow gold', customWidth: '2mm', customGauge: '18ga',
                customTexture: ['Matte'], customSize: '6.5', customNotes: 'Slightly domed profile', stamping: '' }],
      items: [{ desc: 'Stacking ring — labor & metal', amount: 180 }],
      deposit: 80,
    },
    // variant=rings, 3-ring family order — Meditation + Simple Band + Custom
    '2': {
      kindLbl: 'Custom Order', name: 'The Alvarez Family', phone: '(512) 555-7710', email: 'alvarez.fam@example.com',
      takeIn: '2026-07-12', deadline: '2026-08-15', pickup: 'To be Shipped',
      pieceType: 'Ring', jobTitle: 'Family Meditation + Band Set',
      desc: 'Set of 3 for the Alvarez family — see per-ring specs.',
      giftFor: 'Anniversary gift', giftDate: 'needed by 08/12',
      rings: [
        { name: 'Marco', category: 'Meditation Ring', medWidth: '8mm', medTexture: 'Bodhi Leaf',
          medSpinners: '2', medSpinnerStyle: 'Orbit Tricolor', medSize: '10', stamping: 'M+E 2016' },
        { name: 'Elena', category: 'Simple Band', bandWidth: '4mm', bandTexture: 'Smooth',
          bandSize: '6.25', stamping: '' },
        { name: 'Sofia', category: 'Custom Ring', customMetal: 'Sterling silver', customWidth: '3mm',
          customGauge: '20ga', customTexture: ['Hammered/Textured', 'Oxidized'], customSize: '4.75',
          customNotes: 'Small — please double check sizing stock', stamping: '' },
      ],
      items: [
        { desc: 'Meditation ring, 8mm, 2 spinners', amount: 260 },
        { desc: 'Simple band, 4mm silver',           amount: 90 },
        { desc: 'Custom hammered band, 3mm',          amount: 140 },
      ],
      deposit: 250, shipping: 14,
    },
    // variant=repair
    '3': {
      kindLbl: 'Repair', name: 'Katherine Miller', phone: '(512) 555-8890', email: 'kat.m@example.com',
      takeIn: '2026-07-10', deadline: '2026-07-17', pickup: 'Studio',
      pieceType: 'Ring', jobTitle: 'Prong Re-tip + Stone Reset',
      desc: 'Two prongs worn thin on the center stone; stone is loose.',
      notes: 'Please handle gently — this is her late mother’s ring.',
      repairNotes: 'Re-tip 2 prongs at 3 o’clock and 9 o’clock. Reset center stone once prongs are built up. Check remaining prongs for wear while it’s on the bench. Polish after.',
      repairIssues: ['Loose stone', 'Worn prong(s)'],
      ringSize: '6.5',
      materials: '14k white gold, prong wire from bench stock',
      items: [{ desc: 'Prong re-tip (2) + stone reset', amount: 95 }],
      deposit: 0,
    },
    // variant=repair, chain
    '4': {
      kindLbl: 'Repair', name: 'David Chen', phone: '(512) 555-2201', email: 'dchen@example.com',
      takeIn: '2026-07-09', deadline: '2026-07-12', pickup: 'Studio',
      pieceType: 'Necklace', jobTitle: 'Chain Repair — Broken Clasp',
      desc: 'Lobster clasp broken off; customer would like it replaced with a spring ring if possible.',
      repairNotes: 'Replace clasp (spring ring preferred). Check jump ring for wear, replace if needed.',
      repairIssues: ['Broken clasp'],
      materials: '14k yellow gold spring ring clasp, matching jump ring',
      items: [{ desc: 'Clasp replacement', amount: 35 }],
      deposit: 0, fullyPaid: '1',
    },
    // variant=compact — resize, no sketch needed
    '5': {
      kindLbl: 'Resize', name: 'Priya Natarajan', phone: '(512) 555-6634', email: 'priya.n@example.com',
      takeIn: '2026-07-14', deadline: '2026-07-21', pickup: 'Studio',
      pieceType: 'Ring', jobTitle: 'Resize — Size 7 to Size 6',
      desc: 'Standard downsize, no stones near the shank.',
      notes: 'Ring is a family heirloom — please keep the inside stamping visible ("EGN 1978").',
      materials: '14k rose gold band, standard resize stock',
      ringSize: '7', items: [{ desc: 'Resize, down 1 size', amount: 45 }],
      deposit: 0, fullyPaid: '1',
    },
  };

  const src = demo && DEMOS[demo] ? DEMOS[demo] : {
    kindLbl: q.get('kindLbl') || 'Custom Order',
    name: q.get('name') || '', phone: q.get('phone') || '', email: q.get('email') || '',
    address: q.get('address') || '', city: q.get('city') || '', state: q.get('state') || '',
    zip: q.get('zip') || '',
    takeIn: q.get('takeIn') || '', deadline: q.get('deadline') || '',
    pickup: q.get('pickup') || '',
    pieceType: q.get('pieceType') || '', jobTitle: q.get('jobTitle') || '',
    desc: q.get('desc') || '', stones: q.get('stones') || '', finish: q.get('finish') || '',
    notes: q.get('notes') || '', materials: q.get('materials') || '',
    rings: (() => { try { return JSON.parse(q.get('rings') || 'null'); } catch (e) { return null; } })(),
    repairNotes: q.get('repairNotes') || '',
    repairIssues: (() => { try { return JSON.parse(q.get('repairIssues') || '[]'); } catch (e) { return []; } })(),
    ringSize: q.get('ringSize') || '', chain: q.get('chain') || '',
    wrist: q.get('wrist') || '', neck: q.get('neck') || '',
    giftFor: q.get('giftFor') || '', giftDate: q.get('giftDate') || '',
    giftSurprise: q.get('giftSurprise') || '',
    deposit: q.get('deposit') || '', shipping: q.get('shipping') || '',
    fullyPaid: q.get('fullyPaid') || '',
    items: (() => { try { return JSON.parse(q.get('items') || '[]'); } catch (e) { return []; } })(),
  };

  // ── Header ──
  document.getElementById('kind-lbl').textContent = src.kindLbl || 'Custom Order';
  document.getElementById('c-name').textContent = src.name;
  document.getElementById('c-contact').textContent =
    [src.phone, src.email].filter(Boolean).join(' · ');
  const addrLine = [src.address, [src.city, src.state].filter(Boolean).join(', '), src.zip]
    .filter(Boolean).join(' · ');
  if (addrLine) {
    const a = document.getElementById('c-addr');
    a.textContent = addrLine; a.style.display = 'block';
  }
  document.getElementById('d-takein').textContent = fmt(src.takeIn) || fmt(new Date().toISOString().slice(0,10));
  document.getElementById('d-due').textContent = fmt(src.deadline);
  const pk = src.pickup || '';
  document.getElementById('d-pickup').textContent =
    pk ? 'Pickup: ' + (/ship/i.test(pk) ? '📦 Ship' : pk.replace(/\s*(Market|Farmer's Market|Crossing Market)$/i, '')) : '';

  // ── Gift strip ──
  if (src.giftFor || src.giftSurprise) {
    document.getElementById('gift').classList.add('show');
    document.getElementById('gift-for').textContent = src.giftFor || 'Gift';
    document.getElementById('gift-date').textContent = src.giftDate || '';
    if (src.giftSurprise) document.getElementById('gift-surprise').style.display = 'inline';
  }

  // ── Job block ──
  document.getElementById('j-piece').textContent = src.pieceType || '';
  document.getElementById('j-title').textContent = src.jobTitle || '';
  document.getElementById('j-desc').textContent = src.desc || '';
  [['j-stones-row', 'j-stones', src.stones],
   ['j-finish-row', 'j-finish', src.finish],
   ['j-cnotes-row', 'j-cnotes', src.notes]].forEach(([row, cell, val]) => {
    if (val) {
      document.getElementById(cell).textContent = val;
      document.getElementById(row).classList.add('show');
    }
  });

  // ── CENTER: variant-specific render ──
  const centerEl = document.getElementById('center');

  function ringCategoryRows(r) {
    const rows = [];
    if (r.category === 'Meditation Ring') {
      rows.push(['Width', r.medWidth], ['Texture', r.medTexture]);
      if (r.medSpinners) rows.push(['Spinners', r.medSpinners + (r.medSpinnerStyle ? ' — ' + r.medSpinnerStyle : '')]);
    } else if (r.category === 'Simple Band') {
      rows.push(['Width', r.bandWidth], ['Texture', r.bandTexture]);
    } else if (r.category === 'Custom Ring') {
      rows.push(['Metal', r.customMetal], ['Width', r.customWidth], ['Gauge', r.customGauge]);
      if ((r.customTexture || []).length) rows.push(['Texture', r.customTexture.join(' / ')]);
      if (r.customNotes) rows.push(['Notes', r.customNotes]);
    }
    return rows.filter(row => row[1]);
  }
  function ringSize(r) {
    return r.category === 'Meditation Ring' ? r.medSize
         : r.category === 'Simple Band'     ? r.bandSize
         : r.category === 'Custom Ring'     ? r.customSize : '';
  }

  function renderRings(rings) {
    const n = rings.length;
    const grid = document.createElement('div');
    grid.className = 'rings-grid ' + (n === 1 ? 'n1' : n === 2 ? 'n2' : n <= 4 ? (n === 3 ? 'n3' : 'n4') : 'nmany');
    rings.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'ring-card';
      const size = ringSize(r);
      card.innerHTML = `
        <div class="rc-head">
          <div>
            <div class="rc-name">${rings.length > 1 ? 'Ring ' + (i + 1) + (r.name ? ' — ' + r.name : '') : 'Ring'}</div>
            <div class="rc-type">${r.category || ''}</div>
          </div>
          ${size ? `<div class="rc-size">${size}</div>` : ''}
        </div>
        <div class="rc-body">
          ${ringCategoryRows(r).map(([k, v]) => `<div class="rc-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}
        </div>
        ${r.stamping ? `<div class="rc-stamp">“${r.stamping}”</div>` : ''}
      `;
      grid.appendChild(card);
    });
    centerEl.appendChild(grid);
  }

  function renderRepair(src) {
    const box = document.createElement('div');
    box.className = 'repair-box';
    const allIssues = ['Loose stone', 'Worn prong(s)', 'Broken clasp', 'Broken chain', 'Bent/damaged', 'Missing stone', 'Other'];
    const active = new Set(src.repairIssues || []);
    box.innerHTML = `
      <div class="rb-head lbl">Repair Checklist</div>
      <div class="repair-issues">
        ${allIssues.map(iss => `<span class="ck"><span class="bx${active.has(iss) ? ' checked' : ''}"></span>${iss}</span>`).join('')}
      </div>
      <div class="repair-warranty">
        <span class="ck"><span class="bx"></span>Warranty repair (no charge)</span>
      </div>
      <div class="repair-instr">
        <span class="lbl">Repair Instructions</span>
        <div class="txt" id="rp-instr" contenteditable="true"></div>
        <div class="rule"></div>
      </div>
    `;
    centerEl.appendChild(box);
    document.getElementById('rp-instr').textContent = src.repairNotes || '';
  }

  if (variant === 'rings' && Array.isArray(src.rings) && src.rings.length) {
    renderRings(src.rings);
  } else if (variant === 'repair') {
    renderRepair(src);
  } else {
    centerEl.classList.add('compact-empty');
  }

  // ── Materials → bench notes (per-ring text, same logic as
  // custom-sketch-print.html) — hidden when the rings variant already
  // shows the same detail in cards above, to avoid repeating it twice. ──
  let materialsText = src.materials;
  if (Array.isArray(src.rings) && src.rings.length && variant !== 'rings') {
    const multi = src.rings.length > 1;
    materialsText = src.rings.map((r, i) => {
      const rows = ringCategoryRows(r).map(([k, v]) => k + ' ' + v);
      const size = ringSize(r);
      if (size) rows.push('Size ' + size);
      const label = multi ? ('Ring ' + (i + 1) + (r.name ? ' (' + r.name + ')' : '')) : 'Ring';
      return label + ': ' + rows.join(' — ');
    }).join('\n');
  }
  if (materialsText) {
    const m = document.getElementById('n-materials');
    m.textContent = materialsText; m.style.display = 'block';
  }

  // ── Items + money ──
  // Rings variant: staff sometimes track the job's price as one catch-all
  // "Order Total" line instead of pricing each ring's own item — printing
  // that alongside two $0.00 ring rows is confusing and the money strip
  // below already totals everything. Fold it into whichever ring rows are
  // still at $0 instead of printing it as a separate line. The Bench Notes
  // box is hidden in this mode, but staff often hand-type each ring's
  // actual price at the end of its materials line (e.g. "Ring 1 (Scott):
  // Simple Band, 6mm, Smooth — $1215.00") — pull those out and use them so
  // the per-ring split matches what was actually quoted, falling back to
  // an even split only when that text isn't there.
  function _ringAmountsFromMaterials(text) {
    if (!text) return [];
    return text.split('\n').map(line => {
      const m = /\$\s*([\d,]+(?:\.\d{1,2})?)\s*$/.exec(line.trim());
      return m ? parseFloat(m[1].replace(/,/g, '')) : null;
    });
  }
  const items = (src.items || []).filter(it => it && it.desc);
  if (variant === 'rings') {
    const totalIdx = items.findIndex(it => /^order total$/i.test(it.desc.trim()));
    if (totalIdx !== -1) {
      const totalItem = items.splice(totalIdx, 1)[0];
      const zeroItems = items.filter(it => !parseFloat(it.amount));
      if (zeroItems.length) {
        const ringAmounts = _ringAmountsFromMaterials(materialsText).filter(a => a != null);
        if (ringAmounts.length === zeroItems.length) {
          zeroItems.forEach((it, i) => { it.amount = ringAmounts[i]; });
        } else {
          const share = (parseFloat(totalItem.amount) || 0) / zeroItems.length;
          zeroItems.forEach(it => { it.amount = share; });
        }
      }
    }
  }
  if (items.length) {
    const el = document.getElementById('items');
    items.forEach(it => {
      const r = document.createElement('div');
      r.className = 'ir';
      const d = document.createElement('span'); d.contentEditable = 'true'; d.textContent = it.desc;
      const a = document.createElement('span'); a.contentEditable = 'true'; a.textContent = money(it.amount);
      r.appendChild(d); r.appendChild(a); el.appendChild(r);
    });
    el.classList.add('show');
  }
  const sub  = items.reduce((s, it) => s + (parseFloat(it.amount) || 0), 0);
  const tax  = sub * 0.08;
  const ship = parseFloat(src.shipping) || 0;
  const dep  = parseFloat(src.deposit) || 0;
  const tot  = sub + tax + ship;
  document.getElementById('m-sub').textContent = sub ? money(sub) : '';
  document.getElementById('m-tax').textContent = sub ? money(tax) : '';
  if (ship) {
    document.getElementById('m-ship-cell').classList.remove('hide');
    document.getElementById('m-ship').textContent = money(ship);
  }
  document.getElementById('m-total').textContent = tot ? money(tot) : '';
  document.getElementById('m-dep').textContent = dep ? '−' + money(dep) : '';
  document.getElementById('m-bal').textContent =
    src.fullyPaid ? money(0) : (tot ? money(tot - dep) : '');

  // Paid-by boxes: click to toggle, one at a time
  const pbs = ['pb-cash', 'pb-credit', 'pb-check'];
  pbs.forEach(id => document.getElementById(id).addEventListener('click', () => {
    pbs.forEach(o => { if (o !== id) document.getElementById(o).style.background = ''; });
    const el = document.getElementById(id);
    el.style.background = el.style.background ? '' : '#333';
  }));

  // Repair checklist boxes also toggle on click, print-only demo helper.
  document.querySelectorAll('.repair-issues .bx, .repair-warranty .bx').forEach(b => {
    b.addEventListener('click', () => b.classList.toggle('checked'));
  });
</script>
</body>
</html>
