<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>STS Phone</title>
  <meta name="theme-color" content="#1E3D50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STS">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #4E7A94;
      --hdr:          #1E3D50;
      --hdr-bdr:      #2E5C78;
      --accent:       #C9983A;
      --accent-light: #E8C878;
      --accent-bg:    #FDF6E8;
      --accent-border:#E8D0A0;
      --card-bg:      #FFFFFF;
      --bdr:          #B0CDE0;
      --text:         #1A2E38;
      --text2:        #4A6878;
      --text-dim:     #7A9AAA;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      font-size: 15px;
    }

    /* ── Header ── */
    .header {
      background: var(--hdr);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--hdr-bdr);
      gap: 10px;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-light);
    }
    .header-spacer { flex: 1; }
    .gear-btn {
      background: none;
      border: 1px solid var(--hdr-bdr);
      border-radius: 8px;
      color: #7A9AAA;
      font-size: 16px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .gear-btn.active {
      color: var(--accent-light);
      border-color: var(--accent);
      background: rgba(201,152,58,0.18);
    }

    /* ── Tab bar ── */
    .tabs {
      display: flex;
      background: #1A3448;
      border-bottom: 2px solid var(--hdr-bdr);
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #7A9AAA;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 13px 0;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--accent-light);
      border-bottom-color: var(--accent);
    }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Restock page ── */
    .restock-wrap {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .card-head {
      background: #EBF5FB;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--bdr);
    }
    .card-head-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
    }
    .card-count {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* add input */
    .add-row {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #F4EFE8;
    }
    .add-input {
      flex: 1;
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 20px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .add-btn:active { background: #b8882a; }

    /* list */
    .note-list { min-height: 40px; }
    .note-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid #F4EFE8;
    }
    .note-row:last-child { border-bottom: none; }
    .note-cb {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .note-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }
    .note-text.done {
      text-decoration: line-through;
      color: #B0A898;
    }
    .note-del {
      color: #C4A0A0;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      background: none;
      border: none;
    }
    .note-empty {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }
    .note-saving { opacity: 0.45; }

    /* loading */
    .loading-row {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Timer page ── */
    .timer-wrap {
      height: calc(100dvh - 110px);
    }
    .timer-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Restock add form ── */
    .restock-search-wrap { position: relative; }
    .restock-results {
      display: none;
      position: fixed;   /* escapes .card's overflow:hidden so it isn't clipped */
      z-index: 999;
      background: var(--card-bg);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      max-height: 60vh;
      overflow-y: auto;
    }
    .restock-result {
      padding: 10px 12px;
      font-size: 13.5px;
      color: var(--text);
      cursor: pointer;
      border-bottom: 1px solid #F4EFE8;
    }
    .restock-result:last-child { border-bottom: none; }
    .restock-result:active { background: var(--accent-bg); }
    .restock-result-sub { font-size: 11.5px; color: var(--text-dim); }
    .restock-result-none { padding: 10px 12px; font-size: 13px; color: var(--text-dim); }
    .restock-chip {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 14px;
      padding: 8px 12px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .restock-chip-x {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }
    .restock-sizes {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin: 10px 14px 0;
      max-height: 40vh;
      overflow-y: auto;
    }
    .restock-size-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      border: 1px solid var(--bdr);
      border-radius: 10px;
      font-size: 13.5px;
      color: var(--text);
      user-select: none;
    }
    .restock-size-pill.checked {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--text);
    }
    .restock-size-name { flex: 1; min-width: 0; }
    .restock-qty-ctl {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .restock-qty-ctl button {
      width: 26px;
      height: 26px;
      border: 1px solid var(--bdr);
      border-radius: 6px;
      background: var(--card-bg);
      color: var(--text2);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .restock-qty-ctl button:active { background: var(--accent-bg); }
    .restock-qty-ctl input {
      width: 38px;
      text-align: center;
      border: 1px solid var(--bdr);
      border-radius: 6px;
      padding: 4px 2px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      outline: none;
    }
    .restock-qty-ctl input:focus { border-color: var(--accent); }
    .restock-submit-row { padding: 12px 14px 14px; }
    .restock-submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 11px 0;
      cursor: pointer;
    }
    .restock-submit-btn:disabled { background: #C8C0B8; cursor: default; }
    .restock-submit-btn:active:not(:disabled) { background: #b8882a; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1E3D50;
      color: #E8C878;
      border: 1px solid #2E5C78;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { border-color: rgba(180,60,40,0.6); color: #E07060; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">Stones Throw Studio</span>
  <div class="header-spacer"></div>
  <button class="gear-btn" id="rq-edit-gear" onclick="rsToggleEditMode()" title="Toggle Restock Queue editing">⚙</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('restock')">Restock</button>
  <button class="tab-btn" onclick="showTab('timer')">Queue</button>
</div>

<!-- Restock -->
<div class="page active" id="page-restock">
  <div class="restock-wrap">
    <div class="card">
      <div class="card-head">
        <span class="card-head-title">Add to Restock Queue</span>
      </div>
      <div class="add-row restock-search-wrap">
        <input class="add-input" id="restock-search-input" type="text" placeholder="Search Square catalog…" autocomplete="off"
          oninput="rsSearchInput(this.value)">
        <div class="restock-results" id="restock-results"></div>
      </div>
      <div class="restock-chip" id="restock-chip">
        <span id="restock-chip-label"></span>
        <span class="restock-chip-x" onclick="rsClearSelection()">✕</span>
      </div>
      <div class="restock-sizes" id="restock-sizes"></div>
      <div class="restock-submit-row">
        <button class="restock-submit-btn" id="restock-submit-btn" disabled onclick="rsSubmit()">Submit</button>
      </div>
    </div>
  </div>
</div>

<!-- Timer / Restock Queue -->
<div class="page" id="page-timer">
  <div class="timer-wrap">
    <iframe id="queue-frame" title="Restock Queue"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Tab switching ──────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'timer') {
      // Force the embedded jewelry-workflow.html straight to the Restock
      // Queue tab every time this tab is opened — it restores its last-open
      // nav state from localStorage on load (shared, same-origin).
      try {
        localStorage.setItem('sts-nav-parent', 'inventory');
        localStorage.setItem('sts-nav-sub-inventory', 'to-restock');
      } catch (e) {}
      const frame = document.getElementById('queue-frame');
      if (!frame.src) frame.src = 'jewelry-workflow.html?embed=1';
      else frame.contentWindow.location.reload();
    }
  }

  // ── Restock Queue editing toggle (gear button) ──
  // Controls _rqMobileEditMode inside the embedded jewelry-workflow.html via
  // a shared localStorage flag, since the iframe gets reloaded on every tab
  // switch anyway — no postMessage plumbing needed, just reload after flipping it.
  function _rsEditModeOn() {
    try { return localStorage.getItem('sts-rq-edit-mode') === '1'; } catch (e) { return false; }
  }
  function _rsSyncGearBtn() {
    document.getElementById('rq-edit-gear').classList.toggle('active', _rsEditModeOn());
  }
  function rsToggleEditMode() {
    const on = !_rsEditModeOn();
    try { localStorage.setItem('sts-rq-edit-mode', on ? '1' : '0'); } catch (e) {}
    _rsSyncGearBtn();
    toast(on ? 'Queue editing on' : 'Queue editing off');
    const frame = document.getElementById('queue-frame');
    if (frame.src) frame.contentWindow.location.reload();
  }
  _rsSyncGearBtn();

  // ── Toast ─────────────────────────────────────
  let _toastTimer;
  function toast(msg, err) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' err' : '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Restock add form: Square search → variant/size pick → submit ──
  const RESTOCK_BLOCK = 'Inventory Restock';
  let _rsDebounce  = null;
  let _rsResults   = [];     // last search results
  let _rsSelected  = null;   // { id, name, isParent, variants:[{id,name}] } or single-variant item
  let _rsSizesChecked = {};  // { variantId: true }

  function _rsSqCall(path, opts) {
    opts = opts || {};
    const payload = { path: '/v2' + path, method: opts.method || 'GET' };
    if (opts.body) payload.body = opts.body;
    return fetch('/api/square', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).then(r => r.json());
  }

  window.addEventListener('resize', () => {
    const box = document.getElementById('restock-results');
    if (box.style.display === 'block') _rsPositionResults();
  });

  function rsSearchInput(value) {
    const q = (value || '').trim();
    if (_rsDebounce) clearTimeout(_rsDebounce);
    if (!q) { _rsHideResults(); return; }
    _rsDebounce = setTimeout(() => _rsSearch(q), 350);
  }

  function _rsHideResults() {
    const box = document.getElementById('restock-results');
    box.style.display = 'none';
    box.innerHTML = '';
  }

  // Fixed-position dropdown needs its coordinates computed from the input's
  // on-screen position — it's no longer inside .card's box, so it can't rely
  // on CSS top/left percentages.
  function _rsPositionResults() {
    const box   = document.getElementById('restock-results');
    const input = document.getElementById('restock-search-input');
    const rect  = input.getBoundingClientRect();
    box.style.left  = rect.left + 'px';
    box.style.width = rect.width + 'px';
    box.style.top   = (rect.bottom + 4) + 'px';
    box.style.maxHeight = (window.innerHeight - rect.bottom - 12) + 'px';
  }

  function _rsSearch(query) {
    const box = document.getElementById('restock-results');
    box.innerHTML = '<div class="restock-result-none">Searching…</div>';
    box.style.display = 'block';
    _rsPositionResults();

    _rsSqCall('/catalog/search', {
      method: 'POST',
      body: { object_types: ['ITEM'], query: { text_query: { keywords: [query] } }, limit: 20 },
    }).then(searchData => {
      const found = searchData.objects || [];
      if (!found.length) { _rsRenderResults([], query); return; }
      return _rsSqCall('/catalog/batch-retrieve', {
        method: 'POST',
        body: { object_ids: found.map(o => o.id) },
      }).then(batchData => {
        const rows = [];
        (batchData.objects || []).forEach(obj => {
          if (obj.type !== 'ITEM') return;
          const d = obj.item_data || {};
          const vars = d.variations || [];
          rows.push({
            id: obj.id,
            name: d.name || '',
            isParent: vars.length > 1,
            variants: vars.map(v => ({ id: v.id, name: (v.item_variation_data || {}).name || '' })),
          });
        });
        _rsRenderResults(rows, query);
      });
    }).catch(() => _rsRenderResults([], query));
  }

  function _rsRenderResults(items, query) {
    _rsResults = items;
    const box = document.getElementById('restock-results');
    const esc = t => (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if (!items.length) {
      box.innerHTML = `<div class="restock-result-none">No match for "${esc(query)}"</div>`;
      box.style.display = 'block';
      return;
    }
    box.innerHTML = items.map((item, idx) => `
      <div class="restock-result" onclick="rsSelectResult(${idx})">
        ${esc(item.name)}
        ${item.isParent ? `<div class="restock-result-sub">${item.variants.length} sizes</div>` : ''}
      </div>
    `).join('');
    box.style.display = 'block';
  }

  function rsSelectResult(idx) {
    const item = _rsResults[idx];
    if (!item) return;
    _rsSelected = item;
    _rsSizesChecked = {};
    document.getElementById('restock-search-input').value = '';
    _rsHideResults();

    document.getElementById('restock-chip').style.display = 'flex';
    document.getElementById('restock-chip-label').textContent = item.name;

    const sizesBox = document.getElementById('restock-sizes');
    if (item.isParent && item.variants.length) {
      sizesBox.innerHTML = item.variants.map(v => `
        <div class="restock-size-pill" id="rs-pill-${v.id}">
          <span class="restock-size-name">${(v.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>
          <div class="restock-qty-ctl">
            <button type="button" onclick="rsStepQty('${v.id}',-1)">−</button>
            <input type="number" inputmode="numeric" min="0" id="rs-qty-${v.id}" value=""
              placeholder="0" onchange="rsSetQty('${v.id}',this.value)">
            <button type="button" onclick="rsStepQty('${v.id}',1)">+</button>
          </div>
        </div>
      `).join('');
      sizesBox.style.display = 'flex';
    } else {
      // Single-variant item — show one qty control, defaulted to 1.
      const v = item.variants[0];
      if (v) {
        _rsSizesChecked[v.id] = 1;
        sizesBox.innerHTML = `
          <div class="restock-size-pill" id="rs-pill-${v.id}">
            <span class="restock-size-name">Qty</span>
            <div class="restock-qty-ctl">
              <button type="button" onclick="rsStepQty('${v.id}',-1)">−</button>
              <input type="number" inputmode="numeric" min="0" id="rs-qty-${v.id}" value="1"
                onchange="rsSetQty('${v.id}',this.value)">
              <button type="button" onclick="rsStepQty('${v.id}',1)">+</button>
            </div>
          </div>`;
        sizesBox.style.display = 'flex';
      } else {
        sizesBox.style.display = 'none';
        sizesBox.innerHTML = '';
      }
    }
    _rsUpdateSubmitState();
  }

  function rsSetQty(variantId, value) {
    const qty = Math.max(0, parseInt(value, 10) || 0);
    const input = document.getElementById('rs-qty-' + variantId);
    if (input) input.value = qty || '';
    if (qty > 0) _rsSizesChecked[variantId] = qty;
    else delete _rsSizesChecked[variantId];
    const pill = document.getElementById('rs-pill-' + variantId);
    if (pill) pill.classList.toggle('checked', qty > 0);
    _rsUpdateSubmitState();
  }

  function rsStepQty(variantId, delta) {
    const input = document.getElementById('rs-qty-' + variantId);
    const current = (input && parseInt(input.value, 10)) || 0;
    rsSetQty(variantId, current + delta);
  }

  function _rsUpdateSubmitState() {
    const has = _rsSelected && Object.keys(_rsSizesChecked).length > 0;
    document.getElementById('restock-submit-btn').disabled = !has;
  }

  function rsClearSelection() {
    _rsSelected = null;
    _rsSizesChecked = {};
    document.getElementById('restock-chip').style.display = 'none';
    document.getElementById('restock-sizes').style.display = 'none';
    document.getElementById('restock-sizes').innerHTML = '';
    _rsUpdateSubmitState();
  }

  function rsSubmit() {
    if (!_rsSelected || !Object.keys(_rsSizesChecked).length) return;
    const item = _rsSelected;
    const variantIds = Object.keys(_rsSizesChecked);
    const btn = document.getElementById('restock-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Adding…';

    const variantById = {};
    item.variants.forEach(v => { variantById[v.id] = v; });

    Promise.all(variantIds.map(vid => {
      const variant = variantById[vid];
      const text = item.isParent ? `${item.name} — ${variant.name}` : item.name;
      return fetch('/api/notion-notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, block: RESTOCK_BLOCK }),
      }).then(r => r.json().then(d => ({ ok: r.ok, data: d, vid })));
    })).then(results => {
      const failed = results.filter(r => !r.ok);
      const okResults = results.filter(r => r.ok);
      if (okResults.length) {
        return fetch('/api/restock-sizes').then(r => r.json()).then(sizes => {
          sizes = (sizes && typeof sizes === 'object' && !sizes.error) ? sizes : {};
          okResults.forEach(r => {
            const pid = r.data.notionPageId;
            sizes[pid] = sizes[pid] || {};
            sizes[pid][r.vid] = _rsSizesChecked[r.vid] || 1;
          });
          return fetch('/api/restock-sizes', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(sizes),
          }).then(() => failed);
        });
      }
      return failed;
    }).then(failed => {
      btn.textContent = 'Submit';
      rsClearSelection();
      if (failed && failed.length) toast(`Added ${variantIds.length - failed.length}/${variantIds.length} — some failed`, true);
      else toast('Added to Restock Queue');
    }).catch(() => {
      btn.textContent = 'Submit';
      _rsUpdateSubmitState();
      toast('Failed to add item', true);
    });
  }
</script>
</body>
</html>
