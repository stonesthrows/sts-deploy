<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>STS Phone</title>
  <meta name="theme-color" content="#1E3D50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STS">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #4E7A94;
      --hdr:          #1E3D50;
      --hdr-bdr:      #2E5C78;
      --accent:       #C9983A;
      --accent-light: #E8C878;
      --accent-bg:    #FDF6E8;
      --accent-border:#E8D0A0;
      --card-bg:      #FFFFFF;
      --bdr:          #B0CDE0;
      --bdr-light:    #C8DFEE;
      --card-head-bg: #EBF5FB;
      --text:         #1A2E38;
      --text2:        #4A6878;
      --text3:        #6A8898;
      --text-dim:     #7A9AAA;
      --hover:        #EBF5FB;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      font-size: 15px;
    }

    /* ── Header ── */
    .header {
      background: var(--hdr);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--hdr-bdr);
      gap: 10px;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-light);
    }
    .header-spacer { flex: 1; }
    .gear-btn {
      background: none;
      border: 1px solid var(--hdr-bdr);
      border-radius: 8px;
      color: #7A9AAA;
      font-size: 16px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .gear-btn.active {
      color: var(--accent-light);
      border-color: var(--accent);
      background: rgba(201,152,58,0.18);
    }

    /* ── Tab bar ── */
    .tabs {
      display: flex;
      background: #1A3448;
      border-bottom: 2px solid var(--hdr-bdr);
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #7A9AAA;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 13px 0;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--accent-light);
      border-bottom-color: var(--accent);
    }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Restock page ── */
    .restock-wrap {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .card-head {
      background: #EBF5FB;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--bdr);
    }
    .card-head-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
    }
    .card-count {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* add input */
    .add-row {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #F4EFE8;
    }
    .add-input {
      flex: 1;
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 20px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .add-btn:active { background: #b8882a; }

    /* list */
    .note-list { min-height: 40px; }
    .note-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid #F4EFE8;
    }
    .note-row:last-child { border-bottom: none; }
    .note-cb {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .note-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }
    .note-text.done {
      text-decoration: line-through;
      color: #B0A898;
    }
    .note-del {
      color: #C4A0A0;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      background: none;
      border: none;
    }
    .note-empty {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }
    .note-saving { opacity: 0.45; }

    /* loading */
    .loading-row {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Timer page ── */
    .timer-wrap {
      height: calc(100dvh - 110px);
    }
    .timer-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Restock add form ──
       These class names (rq-add-*, rq-result-*, rq-variant-*, inv-badge)
       are not phone.html's own — they're emitted verbatim by the shared
       add-widget functions in js/notes.js (the same code the desktop
       Restock Queue tab's "+ Add" bar runs), so this card behaves
       identically to desktop. Styled here to fit the mobile card layout. */
    .restock-search-wrap { position: relative; }
    .rq-setup-results {
      display: none;
      flex-direction: column;
      border: 1px solid var(--bdr);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-bg);
      max-height: 50vh;
      overflow-y: auto;
    }
    .rq-add-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      z-index: 200; box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }
    .rq-result-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; cursor: pointer; gap: 12px;
      border-bottom: 1px solid #F4EFE8;
    }
    .rq-result-item:last-child { border-bottom: none; }
    .rq-result-item:active { background: var(--accent-bg); }
    .rq-result-name { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .rq-result-meta { font-size: 11.5px; color: var(--text-dim); margin-top: 1px; }
    .rq-result-none { padding: 10px 12px; font-size: 13px; color: var(--text-dim); }
    .rq-match-loading {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-dim); font-style: italic; padding: 10px 12px;
    }
    .rq-match-spinner {
      display: inline-block; width: 11px; height: 11px; flex-shrink: 0;
      border: 2px solid var(--bdr); border-top-color: var(--accent);
      border-radius: 50%; animation: rq-spin 0.7s linear infinite;
    }
    @keyframes rq-spin { to { transform: rotate(360deg); } }
    .rq-add-chip {
      display: none; align-items: center; justify-content: space-between; gap: 8px;
      margin: 0 14px; padding: 8px 12px; background: var(--accent-bg);
      border: 1px solid var(--accent-border); border-radius: 8px;
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .rq-add-chip span:first-child { overflow: hidden; text-overflow: ellipsis; }
    .rq-add-chip-x { cursor: pointer; color: var(--text-dim); font-size: 16px; line-height: 1; flex-shrink: 0; }
    .rq-add-sizes { margin: 10px 14px 0; max-height: 40vh; overflow-y: auto; }
    /* Grouped metal × size table (multi-metal parent items) */
    .rq-variant-table { border-collapse: collapse; font-size: 12px; margin-bottom: 2px; }
    .rq-variant-table th {
      border: 1px solid var(--bdr); padding: 4px 7px; background: var(--card-head-bg);
      color: var(--text2); font-weight: 700; text-align: center; white-space: nowrap;
    }
    .rq-variant-table td { border: 1px solid var(--bdr); padding: 4px; text-align: center; }
    .rq-variant-corner { border: none !important; background: transparent !important; }
    .rq-variant-row-label { text-align: right !important; font-weight: 600; color: var(--text-dim); padding: 4px 9px !important; }
    .rq-variant-inv-row td { padding-top: 5px; border-top: none; }
    .rq-variant-inv-row .inv-badge { font-size: 10.5px; padding: 2px 5px; }
    .rq-variant-qty {
      width: 38px; padding: 3px; border: 1px solid var(--bdr); border-radius: 4px;
      font-size: 12px; text-align: center; font-family: inherit; color: var(--text); background: #fff;
    }
    .rq-variant-qty:focus { border-color: var(--accent); outline: none; }
    /* Flat chip grid (single-metal / few-variant items) */
    .rq-variant-picker { padding: 6px 0 2px; }
    .rq-variant-label { font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
    .rq-variant-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .rq-variant-chip {
      display: flex; flex-direction: column; align-items: stretch; gap: 4px;
      border: 1px solid var(--bdr); border-radius: 6px; padding: 5px 8px 5px 10px;
      font-size: 12.5px; color: var(--text2); background: #fff;
    }
    .rq-variant-chip-row { display: flex; align-items: center; gap: 6px; }
    .rq-variant-chip .inv-badge { font-size: 10.5px; padding: 2px 6px; align-self: flex-start; }
    .rq-variant-chip-on { border-color: var(--accent) !important; background: var(--accent-bg) !important; color: var(--accent) !important; font-weight: 700; }
    .rq-variant-qty-inline {
      width: 36px; padding: 2px 4px; border: 1px solid var(--bdr); border-radius: 4px;
      font-size: 12.5px; text-align: center; font-family: inherit; color: var(--text); background: #fff;
    }
    .rq-variant-qty-inline:focus { border-color: var(--accent); outline: none; }
    .rq-variant-stone-select {
      width: 100%; padding: 2px 3px; border: 1px solid var(--bdr); border-radius: 4px;
      font-size: 11.5px; font-family: inherit; color: var(--text); background: #fff;
    }
    .rq-variant-stone-select:focus { border-color: var(--accent); outline: none; }
    /* On-hand stock badge, same styling/thresholds as the desktop Inventory tab */
    .inv-badge { font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .inv-badge.in-stock  { background: #f0fdf4; color: #16a34a; }
    .inv-badge.low-stock { background: #fffbeb; color: #d97706; }
    .inv-badge.no-stock  { background: #fef2f2; color: #dc2626; }
    .inv-badge.unset     { background: var(--card-head-bg); color: var(--text-dim); font-weight: 400; font-style: italic; }
    .restock-submit-row { padding: 12px 14px 14px; }
    .restock-submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 11px 0;
      cursor: pointer;
    }
    .restock-submit-btn:disabled { background: #C8C0B8; cursor: default; }
    .restock-submit-btn:active:not(:disabled) { background: #b8882a; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1E3D50;
      color: #E8C878;
      border: 1px solid #2E5C78;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { border-color: rgba(180,60,40,0.6); color: #E07060; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">Stones Throw Studio</span>
  <div class="header-spacer"></div>
  <button class="gear-btn" id="rq-edit-gear" onclick="rsToggleEditMode()" title="Toggle Restock Queue editing">⚙</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('restock')">Restock</button>
  <button class="tab-btn" onclick="showTab('timer')">Queue</button>
</div>

<!-- Restock -->
<div class="page active" id="page-restock">
  <div class="restock-wrap">
    <div class="card">
      <div class="card-head">
        <span class="card-head-title">Add to Restock Queue</span>
      </div>
      <div class="add-row restock-search-wrap">
        <input class="add-input" id="rq-add-input" type="text" placeholder="Search Square catalog…" autocomplete="off"
          oninput="rqAddInputChange(this.value)" onkeydown="if(event.key==='Enter')rqAddItem()">
        <div id="rq-add-results" class="rq-setup-results rq-add-dropdown"></div>
      </div>
      <div id="rq-add-chip" class="rq-add-chip" style="display:none"></div>
      <div id="rq-add-sizes" class="rq-add-sizes" style="display:none"></div>
      <div class="restock-submit-row">
        <button class="restock-submit-btn" id="restock-submit-btn" disabled onclick="rqAddItem()">＋ Add</button>
      </div>
    </div>
  </div>
</div>

<!-- Timer / Restock Queue -->
<div class="page" id="page-timer">
  <div class="timer-wrap">
    <iframe id="queue-frame" title="Restock Queue"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/notes.js?v=36"></script>
<script>
  // ── Tab switching ──────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'timer') {
      // Force the embedded jewelry-workflow.html straight to the Restock
      // Queue tab every time this tab is opened — it restores its last-open
      // nav state from localStorage on load (shared, same-origin).
      try {
        localStorage.setItem('sts-nav-parent', 'inventory');
        localStorage.setItem('sts-nav-sub-inventory', 'to-restock');
      } catch (e) {}
      const frame = document.getElementById('queue-frame');
      if (!frame.src) frame.src = 'jewelry-workflow.html?embed=1';
      else frame.contentWindow.location.reload();
    }
  }

  // ── Restock Queue editing toggle (gear button) ──
  // Controls _rqMobileEditMode inside the embedded jewelry-workflow.html via
  // a shared localStorage flag, since the iframe gets reloaded on every tab
  // switch anyway — no postMessage plumbing needed, just reload after flipping it.
  function _rsEditModeOn() {
    try { return localStorage.getItem('sts-rq-edit-mode') === '1'; } catch (e) { return false; }
  }
  function _rsSyncGearBtn() {
    document.getElementById('rq-edit-gear').classList.toggle('active', _rsEditModeOn());
  }
  function rsToggleEditMode() {
    const on = !_rsEditModeOn();
    try { localStorage.setItem('sts-rq-edit-mode', on ? '1' : '0'); } catch (e) {}
    _rsSyncGearBtn();
    toast(on ? 'Queue editing on' : 'Queue editing off');
    const frame = document.getElementById('queue-frame');
    if (frame.src) frame.contentWindow.location.reload();
  }
  _rsSyncGearBtn();

  // ── Toast ─────────────────────────────────────
  let _toastTimer;
  function toast(msg, err) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' err' : '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Restock add form ──
  // This card runs the exact same add-widget functions as the desktop
  // Restock Queue tab's "+ Add" bar (rqAddInputChange, rqAddItem, etc. —
  // defined in js/notes.js, loaded above), driven against #rq-add-* element
  // ids instead of duplicating the search/select/submit logic here. That's
  // what guarantees identical behavior: one Notion page per item (not per
  // size), the real matched item name as the title, and the same grouped
  // metal x size table / stone picker for multi-variant items.
  //
  // notes.js normally loads _rqAutoMatches (localStorage) and _rqSizes
  // (server) lazily, the first time the desktop queue list renders. There's
  // no queue list on this page, so that lazy path never fires — without
  // loading them explicitly first, _rqAmSet/_rqSaveSizesFor would each
  // overwrite the shared store with only this page's one new item, wiping
  // out every other item's saved match/sizes. Submit stays disabled until
  // both have loaded.
  var INV_LOCATION_ID = 'D7EZ98V48F79A'; // used by notes.js's on-hand-stock badges
  _rqAmLoad();
  _rqAmLoaded = true;
  document.getElementById('restock-submit-btn').disabled = true;
  _rqLoadSizes(function() {
    document.getElementById('restock-submit-btn').disabled = false;
  });
</script>
</body>
</html>
