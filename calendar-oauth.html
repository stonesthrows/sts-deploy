<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Connecting…</title></head>
<body>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var hash   = new URLSearchParams(location.hash.slice(1));

  // Authorization code flow (PKCE)
  var code = params.get('code');
  if (code && window.opener) {
    window.opener.postMessage(
      { type: 'sts-gcal-code', code: code },
      location.origin
    );
    window.close();
    return;
  }

  // Legacy implicit flow fallback
  var token = hash.get('access_token');
  if (token && window.opener) {
    window.opener.postMessage(
      { type: 'sts-google-oauth', token: token, expiresIn: hash.get('expires_in') || '3600' },
      location.origin
    );
    window.close();
  }
})();
</script>
<p style="font-family:sans-serif;padding:24px;color:#555">Connecting to Google…</p>
</body>
</html>
