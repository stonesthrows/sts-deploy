<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Connecting…</title></head>
<body>
<script>
(function () {
  if (location.hash && location.hash.includes('access_token')) {
    var p = new URLSearchParams(location.hash.slice(1));
    var t = p.get('access_token');
    if (t && window.opener) {
      window.opener.postMessage(
        { type: 'sts-gcal-oauth', token: t, expiresIn: p.get('expires_in') || '3600' },
        location.origin
      );
      window.close();
    }
  }
})();
</script>
<p style="font-family:sans-serif;padding:24px">Connecting to Google Calendar…</p>
</body>
</html>
