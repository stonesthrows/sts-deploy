<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Your Estimate · Stones Throw Studio</title>
  <style>
    :root {
      --gold:#C9983A; --gold-dk:#8a6d1f; --ink:#2e2818; --dim:#6a6250;
      --line:#E4E2DD; --card:#FAFAF9; --bg:#4E7A94; --ok:#2f8f4e; --changes:#b06a1f;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--bg); color:var(--ink);
      padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      line-height:1.45;
    }
    .wrap { max-width:600px; margin:0 auto; padding:22px 16px 60px; }
    header { text-align:center; margin-bottom:18px; }
    header .shop { font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#E8C878; font-weight:700; }
    header h1 { font-size:22px; margin:6px 0 0; font-weight:700; color:#ffffff; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
    .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin:0 0 12px; font-weight:700; }
    .sketch { width:100%; border-radius:10px; display:block; background:#F4F4F2; border:1px solid var(--line); }
    .gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:8px; }
    .gallery img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; background:#F4F4F2; border:1px solid var(--line); cursor:zoom-in; }
    .gallery.single { grid-template-columns:1fr; }
    .gallery.single img { aspect-ratio:auto; cursor:zoom-in; }
    .opt-toggle { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .opt-btn {
      flex:1 1 100px; border:1.5px solid var(--line); background:#fff; color:var(--ink);
      border-radius:10px; padding:10px 8px; font:inherit; font-weight:700; font-size:14px; cursor:pointer;
    }
    .opt-btn.active { border-color:var(--gold); background:#FBF3E2; color:var(--gold-dk); }
    .opt-btn .star { color:var(--gold-dk); }
    .opt-image { width:100%; border-radius:10px; display:block; margin-bottom:14px; background:#F4F4F2; border:1px solid var(--line); cursor:zoom-in; }
    .lightbox {
      position:fixed; inset:0; background:rgba(20,20,18,.92); z-index:100;
      display:flex; align-items:center; justify-content:center; padding:24px; cursor:zoom-out;
    }
    .lightbox img { max-width:100%; max-height:100%; border-radius:8px; }
    table { width:100%; border-collapse:collapse; font-size:15.5px; }
    td { padding:5px 0; }
    td.r { text-align:right; }
    .qty { color:#9a8f75; }
    .divider td { border-top:1px solid var(--line); padding-top:10px; }
    .total td { font-weight:700; font-size:18px; padding-top:10px; border-top:2px solid var(--ink); }
    .note { white-space:pre-wrap; color:#4a4230; margin:0; }
    label.fld { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); font-weight:700; margin:0 0 8px; }
    textarea {
      width:100%; min-height:96px; border:1px solid var(--line); border-radius:10px;
      padding:12px; font:inherit; font-size:16px; background:#FCFCFB; resize:vertical; color:var(--ink);
    }
    textarea:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,152,58,.18); }
    .btns { display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; }
    button {
      flex:1 1 180px; border:none; border-radius:12px; padding:16px; font:inherit;
      font-weight:700; font-size:16px; cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .approve { background:linear-gradient(135deg,#C9983A,#A87C28); color:#fff; }
    .approve:active { background:#b78829; }
    .changes { background:#fff; color:var(--changes); border:1.5px solid var(--changes); }
    .changes:active { background:#fdf3e7; }
    button:disabled { opacity:.5; }
    .state { text-align:center; padding:30px 16px; }
    .state .big { font-size:44px; line-height:1; }
    .state h2 { border:0; text-transform:none; letter-spacing:0; font-size:20px; color:var(--ink); margin:12px 0 6px; }
    .state p { color:var(--dim); margin:0; }
    .muted { color:rgba(255,255,255,.8); font-size:13px; text-align:center; margin-top:20px; }
    .banner { border-radius:12px; padding:14px 16px; margin-bottom:16px; font-weight:600; }
    .banner.ok { background:#eaf6ee; color:var(--ok); }
    .banner.changes { background:#fbf0e2; color:var(--changes); }
    .hidden { display:none; }
    .err { color:#b03030; text-align:center; padding:40px 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="shop" id="shop">Stones Throw Studio</div>
      <h1>Your Custom Estimate</h1>
    </header>

    <div id="loading" class="muted" style="padding:50px 0;">Loading your estimate…</div>
    <div id="error" class="err hidden"></div>

    <main id="content" class="hidden">
      <div id="responded-banner" class="hidden"></div>

      <div class="card" id="sketch-card">
        <h2>Design</h2>
        <div id="gallery" class="gallery"></div>
      </div>

      <div class="card">
        <h2 id="est-heading">Estimate</h2>
        <div id="est-title" class="hidden" style="font-weight:700;font-size:16px;margin-bottom:10px;"></div>
        <div id="opt-toggle" class="opt-toggle hidden"></div>
        <img id="opt-image" class="opt-image hidden" onclick="zoomImage(this.src)">
        <table id="est-table"></table>
      </div>

      <div class="card hidden" id="note-card">
        <h2>A note from Kyle</h2>
        <p class="note" id="cust-note"></p>
      </div>

      <div class="card" id="respond-card">
        <h2>Your response</h2>
        <label class="fld" for="resp">Notes or questions (optional)</label>
        <textarea id="resp" placeholder="Anything you'd like changed, or just say it looks great…"></textarea>
        <div class="btns">
          <button class="approve" id="btn-approve" onclick="respond('approved')">✓ Approve estimate</button>
          <button class="changes" id="btn-changes" onclick="respond('changes')">Request changes</button>
        </div>
      </div>

      <p class="muted">Questions? Reply to the email or text Kyle at 512-217-3455.</p>
    </main>
  </div>

  <script>
    var TOKEN = new URLSearchParams(location.search).get('token') || '';
    var REC = null;
    var $ = function (id) { return document.getElementById(id); };
    function money(n) { return '$' + (Number(n) || 0).toFixed(2); }
    function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }

    function showError(msg) {
      $('loading').classList.add('hidden');
      var e = $('error'); e.textContent = msg; e.classList.remove('hidden');
    }

    var SELECTED_OPTION = 0;

    function renderOptionTable(opt) {
      var lines = Array.isArray(opt.lines) ? opt.lines : [];
      var rows = '';
      lines.forEach(function (ln) {
        rows += '<tr><td>' + esc(ln.label) + '</td><td class="r">' + money(ln.amount) + '</td></tr>';
      });
      rows += '<tr class="total"><td>Total</td><td class="r">' + money(opt.total) + '</td></tr>';
      $('est-table').innerHTML = rows;
      var img = $('opt-image');
      if (opt.image) { img.src = opt.image; img.classList.remove('hidden'); }
      else { img.classList.add('hidden'); }
    }

    function selectOption(i) {
      SELECTED_OPTION = i;
      var opts = REC.options;
      renderOptionTable(opts[i]);
      var btns = document.querySelectorAll('#opt-toggle .opt-btn');
      btns.forEach(function (b, bi) { b.classList.toggle('active', bi === i); });
    }

    function renderEstimate(r) {
      if (r.title) { var t = $('est-title'); t.textContent = r.title; t.classList.remove('hidden'); }
      var options = Array.isArray(r.options) ? r.options : [];
      if (options.length > 1) {
        $('est-heading').textContent = 'Choose your option';
        var toggle = $('opt-toggle');
        toggle.innerHTML = options.map(function (o, i) {
          return '<button type="button" class="opt-btn" onclick="selectOption(' + i + ')">'
            + (o.crowned ? '<span class="star">★</span> ' : '') + esc(o.label) + '</button>';
        }).join('');
        toggle.classList.remove('hidden');
        var startAt = options.findIndex(function (o) { return o.crowned; });
        selectOption(startAt >= 0 ? startAt : 0);
        return;
      }
      renderOptionTable({ lines: r.lines, total: r.total, image: null });
    }

    function renderRespondedState(r) {
      var approved = r.status === 'approved';
      var b = $('responded-banner');
      b.className = 'banner ' + (approved ? 'ok' : 'changes');
      var when = r.respondedAt ? new Date(r.respondedAt).toLocaleDateString(undefined, { month:'long', day:'numeric', year:'numeric' }) : '';
      b.innerHTML = (approved ? '✓ You approved this estimate' : '✎ You requested changes')
        + (r.selectedOption ? ' — ' + esc(r.selectedOption) : '')
        + (when ? ' on ' + when : '')
        + (r.response ? '<div style="font-weight:400;margin-top:6px;white-space:pre-wrap">“' + esc(r.response) + '”</div>' : '');
      b.classList.remove('hidden');
      // Lock the form
      $('resp').value = r.response || '';
      $('resp').disabled = true;
      $('btn-approve').disabled = true;
      $('btn-changes').disabled = true;
      $('respond-card').classList.add('hidden');
      document.querySelectorAll('#opt-toggle .opt-btn').forEach(function (b2) { b2.disabled = true; });
    }

    function renderGallery(r) {
      // Accept the current array shape, but fall back to a legacy single
      // `sketch` string for any link created before the gallery rework.
      var images = Array.isArray(r.images) && r.images.length ? r.images
                 : (r.sketch ? [r.sketch] : []);
      if (!images.length) { $('sketch-card').classList.add('hidden'); return; }
      var g = $('gallery');
      g.classList.toggle('single', images.length === 1);
      g.innerHTML = images.map(function (src, i) {
        return '<img src="' + src + '" alt="Design image ' + (i + 1) + '" onclick="zoomImage(this.src)">';
      }).join('');
    }

    function zoomImage(src) {
      var box = document.createElement('div');
      box.className = 'lightbox';
      box.innerHTML = '<img src="' + src + '" alt="Design image, full size">';
      box.onclick = function () { box.remove(); };
      document.body.appendChild(box);
    }

    function render(r) {
      REC = r;
      if (r.shopName) $('shop').textContent = r.shopName;
      renderGallery(r);
      renderEstimate(r);
      if (r.notesForCustomer) { $('cust-note').textContent = r.notesForCustomer; $('note-card').classList.remove('hidden'); }
      $('loading').classList.add('hidden');
      $('content').classList.remove('hidden');
      if (r.status === 'approved' || r.status === 'changes') renderRespondedState(r);
    }

    function respond(decision) {
      $('btn-approve').disabled = true;
      $('btn-changes').disabled = true;
      var notes = $('resp').value.trim();
      var options = Array.isArray(REC.options) ? REC.options : [];
      var selectedOption = options.length > 1 ? options[SELECTED_OPTION].label : '';
      fetch('/api/approval', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ kind: 'respond', token: TOKEN, decision: decision, notes: notes, selectedOption: selectedOption }),
      }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
        .then(function (res) {
          if (!res.ok) throw new Error(res.d.error || 'Could not save your response');
          REC.status = decision; REC.response = notes; REC.respondedAt = new Date().toISOString();
          REC.selectedOption = selectedOption;
          renderRespondedState(REC);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        })
        .catch(function (e) {
          $('btn-approve').disabled = false;
          $('btn-changes').disabled = false;
          alert(e.message || 'Something went wrong — please try again.');
        });
    }

    (function init() {
      if (!TOKEN) { showError('This link is missing its estimate code. Please use the link from your email.'); return; }
      fetch('/api/approval?token=' + encodeURIComponent(TOKEN))
        .then(function (r) {
          if (r.status === 404) throw new Error('We couldn’t find this estimate. It may have been removed — please contact Kyle.');
          return r.json();
        })
        .then(function (d) {
          if (!d.approval) throw new Error(d.error || 'Estimate not available.');
          render(d.approval);
        })
        .catch(function (e) { showError(e.message || 'Unable to load this estimate.'); });
    })();
  </script>
</body>
</html>
