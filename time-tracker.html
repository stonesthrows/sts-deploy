<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS Work Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #4E7A94;
    --hdr: #1E3D50;
    --accent: #C9983A;
    --accent-mid: #D4AA56;
    --accent-light: #E8C878;
    --accent-bg: #FDF6E8;
    --accent-border: #E8D0A0;
    --card-bg: #FFFFFF;
    --card-head-bg: #EBF5FB;
    --bdr: #B0CDE0;
    --bdr-light: #C8DFEE;
    --text: #1A2E38;
    --text2: #4A6878;
    --text3: #6A8898;
    --text-dim: #7A9AAA;
    --green: #3A7A4A;
    --red: #A0402A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; min-height: 100vh; padding: 2rem 1rem 4rem; font-size: 14px; }

  .page-wrap { max-width: 1200px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--bdr); }
  .wordmark { font-size: 13px; letter-spacing: 0.3em; color: var(--accent-light); text-transform: uppercase; margin-bottom: 0.4rem; font-weight: 700; }
  header h1 { font-size: 11px; letter-spacing: 0.2em; color: var(--bdr); text-transform: uppercase; font-weight: 400; }

  /* ── Two-card grid ── */
  .timers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 2rem; }
  @media (max-width: 700px) { .timers-grid { grid-template-columns: 1fr; } }

  .timer-card { border: 1px solid var(--bdr); border-radius: 12px; padding: 1.25rem; background: var(--card-bg); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card-header { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--hdr); text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--bdr-light); }

  .step { background: var(--card-head-bg); border: 1px solid var(--bdr-light); border-radius: 10px; padding: 1.25rem; margin-bottom: 0.75rem; transition: border-color 0.2s, opacity 0.2s; }
  .step.active { border-color: var(--bdr); }
  .step.dimmed { opacity: 0.4; pointer-events: none; }
  .step-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-bottom: 0.65rem; }

  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; background: #fff; border: 1px solid var(--bdr); border-radius: 8px; color: var(--text); font-size: 14px; padding: 0.65rem 0.875rem 0.65rem 2.5rem; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(201,152,58,0.15); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; }
  .spinner { position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; border: 2px solid var(--bdr); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  .results { margin-top: 0.4rem; display: none; flex-direction: column; gap: 0.3rem; max-height: 240px; overflow-y: auto; }
  .results.visible { display: flex; }
  .results::-webkit-scrollbar { width: 4px; }
  .results::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }
  .result-item { background: #fff; border: 1px solid var(--bdr-light); border-radius: 7px; padding: 0.6rem 0.875rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.15s, background 0.15s; }
  .result-item:hover { border-color: var(--accent); background: var(--accent-bg); }
  .result-name { font-size: 13px; color: var(--text); }
  .result-meta { font-size: 10px; color: var(--text3); text-align: right; white-space: nowrap; margin-left: 0.75rem; }
  .result-price { color: var(--accent); font-weight: 600; }

  .selected-item { display: none; background: var(--accent-bg); border: 1px solid var(--accent-border); border-radius: 8px; padding: 0.75rem 0.875rem; align-items: center; justify-content: space-between; gap: 0.75rem; }
  .selected-item.visible { display: flex; }
  .selected-name { font-size: 14px; color: var(--text); font-weight: 600; }
  .selected-meta { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .clear-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px; flex-shrink: 0; transition: color 0.15s; }
  .clear-btn:hover { color: var(--text); }

  .employee-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
  .emp-btn { background: #fff; border: 1px solid var(--bdr-light); border-radius: 7px; color: var(--text); font-size: 13px; padding: 0.6rem 0.75rem; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; display: flex; align-items: center; gap: 0.5rem; }
  .emp-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
  .emp-btn.selected { border-color: var(--accent); background: var(--accent-bg); font-weight: 600; }
  .emp-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--hdr); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent-light); flex-shrink: 0; }

  .timer-section { text-align: center; padding: 0.25rem 0; }
  .timer-display { font-family: 'DM Mono', monospace; font-size: 44px; font-weight: 400; letter-spacing: 0.05em; color: var(--hdr); line-height: 1; margin-bottom: 0.4rem; }
  .timer-status { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-bottom: 1.25rem; min-height: 14px; }
  .btn-row { display: flex; gap: 0.6rem; justify-content: center; }
  .btn { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.65rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-start { background: var(--accent); color: #fff; }
  .btn-start:hover { background: var(--accent-mid); }
  .btn-start:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-stop { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-stop:hover { background: rgba(160,64,42,0.08); }
  .btn-stop:disabled { opacity: 0.4; cursor: not-allowed; }
  .notes-row { margin-top: 0.875rem; }
  .notes-input { width: 100%; background: #fff; border: 1px solid var(--bdr); border-radius: 8px; color: var(--text); font-size: 13px; padding: 0.6rem 0.875rem; outline: none; resize: none; height: 56px; transition: border-color 0.2s; }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: var(--text-dim); }
  .saving-badge { display: none; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-top: 0.6rem; text-align: center; }
  .saving-badge.visible { display: block; }

  /* ── Clock-in status badge ── */
  .clock-status { display: none; margin-top: 0.6rem; font-size: 11px; font-weight: 600; padding: 0.4rem 0.75rem; border-radius: 6px; }
  .clock-status.visible { display: block; }
  .clock-status.checking { color: var(--text3); background: var(--card-head-bg); border: 1px solid var(--bdr-light); }
  .clock-status.clocked-in { color: var(--green); background: #edf7f0; border: 1px solid #b2d8bc; }
  .clock-status.not-clocked-in { color: #7a2810; background: #fdf0ec; border: 1px solid #f0b8a8; }
  .clock-status.error { color: var(--text3); background: var(--card-head-bg); border: 1px solid var(--bdr-light); }

  /* ── Shared log + config ── */
  .log-section { border-top: 1px solid var(--bdr); padding-top: 1.5rem; }
  .log-title { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--text2); text-transform: uppercase; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .notion-link { font-size: 11px; color: var(--text3); text-decoration: none; border: 1px solid var(--bdr); border-radius: 6px; padding: 4px 10px; transition: border-color 0.15s, color 0.15s; }
  .notion-link:hover { border-color: var(--accent); color: var(--accent); }
  .log-empty { font-size: 13px; color: var(--text-dim); text-align: center; padding: 1.5rem 0; }
  .log-entry { background: var(--card-bg); border: 1px solid var(--bdr-light); border-radius: 8px; padding: 0.875rem 1rem; margin-bottom: 0.5rem; display: grid; grid-template-columns: 1fr auto; gap: 0.5rem; align-items: start; }
  .log-item-name { font-size: 14px; color: var(--text); font-weight: 600; }
  .log-item-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .log-duration { font-size: 13px; font-weight: 700; color: var(--accent); text-align: right; }
  .log-ded { font-size: 10px; color: var(--text-dim); margin-top: 2px; text-align: right; }
  .log-saved { font-size: 10px; color: var(--green); margin-top: 2px; text-align: right; font-weight: 600; }
  .log-err { font-size: 10px; color: var(--red); margin-top: 2px; text-align: right; }

  .config-panel { margin-top: 2rem; border-top: 1px solid var(--bdr); padding-top: 1.5rem; }
  .config-toggle { background: none; border: none; color: var(--text3); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0; transition: color 0.15s; }
  .config-toggle:hover { color: var(--text2); }
  .config-body { display: none; margin-top: 1rem; flex-direction: column; gap: 0.75rem; max-width: 480px; }
  .config-body.open { display: flex; }
  .config-row { display: flex; flex-direction: column; gap: 0.35rem; }
  .config-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .config-input { background: #fff; border: 1px solid var(--bdr); border-radius: 6px; color: var(--text); font-size: 13px; padding: 0.6rem 0.875rem; outline: none; width: 100%; transition: border-color 0.2s; }
  .config-input:focus { border-color: var(--accent); }
  .config-hint { font-size: 11px; color: var(--text3); line-height: 1.5; }
  .config-save { background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.25rem; cursor: pointer; align-self: flex-start; transition: background 0.15s; }
  .config-save:hover { background: var(--accent-mid); }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--hdr); border: 1px solid #2E5C78; border-radius: 8px; padding: 0.75rem 1.25rem; font-size: 13px; color: #fff; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 100; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: rgba(160,64,42,0.6); color: #e07050; }
</style>
</head>
<body>
<div class="page-wrap">
  <header>
    <div class="wordmark">Stones Throw Studio</div>
    <h1>Work Timer</h1>
  </header>

  <div class="timers-grid" id="timers-grid">
    <!-- Cards injected by JS -->
  </div>

  <div class="log-section">
    <div class="log-title">
      <span>Session log</span>
      <a class="notion-link" href="https://app.notion.com/p/e59ae574e5ee4d569395e15bd56450e9" target="_blank">Open in Notion ↗</a>
    </div>
    <div id="log-list"><div class="log-empty">No sessions recorded yet</div></div>
  </div>

  <div class="config-panel">
    <button class="config-toggle" onclick="toggleConfig()">⚙ API settings</button>
    <div class="config-body" id="config-body">
      <div style="font-size:12px;color:var(--muted);padding:0.25rem 0 0.5rem;">Shared across both timers. Square token is read from ⚙ Integrations in the main app.</div>
      <div class="config-row">
        <label class="config-label">Square Access Token</label>
        <input class="config-input" id="sq-token" type="password" placeholder="sq0atp-…" autocomplete="off">
      </div>
      <div class="config-row">
        <label class="config-label">Square Location ID</label>
        <input class="config-input" id="sq-location" type="text" placeholder="D7EZ98V48F79A">
      </div>
      <div class="config-row">
        <label class="config-label">Notion Integration Token</label>
        <input class="config-input" id="notion-token" type="password" placeholder="secret_…" autocomplete="off">
        <span class="config-hint">Share the STS Work Sessions database with your Notion integration.</span>
      </div>
      <button class="config-save" onclick="saveConfig()">Save &amp; reload</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ── Inventory confirmation modal ── -->
<div id="inv-modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;">
  <div style="background:var(--card-bg);border-radius:14px;padding:24px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.25);">
    <div style="font-size:13px;font-weight:700;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px;">📦 Add to Square Inventory?</div>
    <div id="inv-modal-item" style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;"></div>
    <div id="inv-modal-detail" style="font-size:13px;color:var(--text2);margin-bottom:20px;"></div>
    <div id="inv-modal-status" style="font-size:12px;color:var(--text2);margin-bottom:12px;min-height:16px;"></div>
    <div style="display:flex;gap:10px;">
      <button id="inv-modal-confirm" onclick="inventoryConfirm()"
        style="flex:1;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
        Add to Square
      </button>
      <button onclick="inventorySkip()"
        style="padding:10px 18px;background:none;border:1px solid var(--bdr);border-radius:8px;font-size:14px;color:var(--text2);cursor:pointer;">
        Skip
      </button>
    </div>
  </div>
</div>

<script>
const NOTION_DB = 'e59ae574e5ee4d569395e15bd56450e9';
const NUM_TIMERS = 2;

// ── Shared config ────────────────────────────────────────────────────────────
const CFG = { sqToken: '', sqLocation: 'D7EZ98V48F79A', notionToken: '' };

// ── Per-timer state ──────────────────────────────────────────────────────────
const T = Array.from({ length: NUM_TIMERS }, (_, i) => ({
  id: i,
  selectedItem: null, selectedEmployee: null,
  running: false, startTime: null, tickInterval: null, debounce: null,
  clockStatus: 'unknown', // 'unknown' | 'checking' | 'clocked-in' | 'not-clocked-in' | 'error'
}));

// ── Shared ───────────────────────────────────────────────────────────────────
let employees = [];
let sessions  = [];

// ── DOM helpers ──────────────────────────────────────────────────────────────
const $g = id => document.getElementById(id);
// Scoped to a timer card
const $t = (tid, id) => document.getElementById(`t${tid}-${id}`);
const $card = tid => document.getElementById(`card-${tid}`);

// ── Square proxy ─────────────────────────────────────────────────────────────
function sq(path, opts = {}) {
  const bodyObj = opts.body ? JSON.parse(opts.body) : undefined;
  return fetch('/api/square', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: '/v2' + path, method: opts.method || 'GET', body: bodyObj, token: CFG.sqToken }),
  }).then(r => r.json());
}

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(n => String(n).padStart(2,'0')).join(':');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, error = false) {
  const t = $g('toast'); t.textContent = msg; t.className = 'toast show' + (error ? ' error' : '');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Build card HTML ───────────────────────────────────────────────────────────
function buildCard(tid) {
  const label = `Timer ${tid + 1}`;
  return `
  <div class="timer-card" id="card-${tid}">
    <div class="card-header">${label}</div>

    <div class="step active" id="t${tid}-step-product">
      <div class="step-label">01 — Select product</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="t${tid}-search-input" placeholder="Search Square catalog…" autocomplete="off">
        <div class="spinner" id="t${tid}-spinner"></div>
      </div>
      <div class="results" id="t${tid}-results"></div>
      <div class="selected-item" id="t${tid}-selected-item">
        <div>
          <div class="selected-name" id="t${tid}-sel-name"></div>
          <div class="selected-meta" id="t${tid}-sel-meta"></div>
        </div>
        <button class="clear-btn" onclick="clearSelection(${tid})" title="Change item">✕</button>
      </div>
    </div>

    <div class="step" id="t${tid}-step-employee">
      <div class="step-label">02 — Who's working?</div>
      <div class="employee-grid" id="t${tid}-employee-grid"></div>
      <div class="clock-status" id="t${tid}-clock-status"></div>
    </div>

    <div class="step dimmed" id="t${tid}-step-timer">
      <div class="step-label">03 — Timer</div>
      <div class="timer-section">
        <div class="timer-display" id="t${tid}-timer-display">00:00:00</div>
        <div class="timer-status" id="t${tid}-timer-status"></div>
        <div class="btn-row">
          <button class="btn btn-start" id="t${tid}-start-btn" onclick="startTimer(${tid})" disabled>Start</button>
          <button class="btn btn-stop"  id="t${tid}-stop-btn"  onclick="stopTimer(${tid})"  style="display:none">Stop &amp; Save</button>
        </div>
        <div class="notes-row" style="display:flex;gap:8px;align-items:flex-start;margin-top:10px;">
          <div style="flex:1;">
            <textarea class="notes-input" id="t${tid}-notes-input" placeholder="Optional notes…" style="width:100%;"></textarea>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;">
            <label style="font-size:10px;color:var(--text2);white-space:nowrap;font-weight:600;letter-spacing:0.03em;">PIECES MADE</label>
            <input type="number" min="0" step="1" id="t${tid}-pieces-input"
              style="width:68px;padding:6px 8px;border:1px solid var(--bdr);border-radius:8px;font-size:18px;font-weight:700;text-align:center;background:var(--card-bg);color:var(--text);-moz-appearance:textfield;"
              placeholder="0">
          </div>
        </div>
        <div class="saving-badge" id="t${tid}-saving-badge">Saving to Notion…</div>
      </div>
    </div>
  </div>`;
}

// ── Render cards ─────────────────────────────────────────────────────────────
function buildCards() {
  $g('timers-grid').innerHTML = Array.from({ length: NUM_TIMERS }, (_, i) => buildCard(i)).join('');
  // Attach search listeners after DOM is ready
  for (let i = 0; i < NUM_TIMERS; i++) {
    (tid => {
      $t(tid, 'search-input').addEventListener('input', () => {
        const q = $t(tid, 'search-input').value.trim();
        clearTimeout(T[tid].debounce);
        if (q.length < 2) { hideResults(tid); return; }
        T[tid].debounce = setTimeout(() => searchCatalog(tid, q), 350);
      });
    })(i);
  }
}

// ── Employees ────────────────────────────────────────────────────────────────
async function loadEmployees() {
  if (!CFG.sqToken) { useMockEmployees(); return; }
  try {
    const data = await sq('/team-members?location_ids=' + CFG.sqLocation);
    const members = (data.team_members || []).filter(m => m.status === 'ACTIVE');
    employees = members.length
      ? members.map(m => ({ id: m.id, name: m.display_name || [m.given_name, m.family_name].filter(Boolean).join(' ') }))
      : [{ id: 'Q5gZGbDStWUysIE3CKhJ', name: 'Stevana Schafer' }, { id: 'TMAMWG-ZS9lqZWKm', name: 'Vanessa Bigley' }];
  } catch { useMockEmployees(); }
  renderEmployees();
}
function useMockEmployees() {
  employees = [{ id: 'Q5gZGbDStWUysIE3CKhJ', name: 'Stevana Schafer' }, { id: 'TMAMWG-ZS9lqZWKm', name: 'Vanessa Bigley' }];
}
function renderEmployees() {
  for (let tid = 0; tid < NUM_TIMERS; tid++) {
    const grid = $t(tid, 'employee-grid'); grid.innerHTML = '';
    employees.forEach(emp => {
      const init = emp.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const btn = document.createElement('button');
      btn.className = 'emp-btn'; btn.dataset.id = emp.id;
      btn.innerHTML = `<div class="emp-avatar">${init}</div>${emp.name}`;
      btn.onclick = () => {
        $t(tid, 'employee-grid').querySelectorAll('.emp-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        T[tid].selectedEmployee = emp;
        T[tid].clockStatus = 'unknown';
        checkReady(tid);
        checkClockIn(tid);
      };
      grid.appendChild(btn);
    });
    // Re-highlight if a timer was already running when employees loaded
    if (T[tid].selectedEmployee) {
      const empId = T[tid].selectedEmployee.id;
      grid.querySelectorAll('.emp-btn').forEach(b => { if (b.dataset.id === empId) b.classList.add('selected'); });
    }
  }
}

// ── Catalog search ────────────────────────────────────────────────────────────
async function searchCatalog(tid, query) {
  $t(tid, 'spinner').classList.add('active');
  try {
    if (!CFG.sqToken) { mockSearch(tid, query); return; }
    const searchData = await sq('/catalog/search', { method: 'POST', body: JSON.stringify({ object_types: ['ITEM'], query: { text_query: { keywords: [query] } }, limit: 20 }) });
    const found = searchData.objects || [];
    if (!found.length) { renderResults(tid, [], query); return; }
    const fullData = await sq('/catalog/batch-retrieve', { method: 'POST', body: JSON.stringify({ object_ids: found.map(o => o.id) }) });
    const rows = [];
    (fullData.objects || []).forEach(obj => {
      const itemName = obj.item_data?.name || 'Unnamed';
      const category = obj.item_data?.category_name || '';
      const variations = obj.item_data?.variations || [];
      if (variations.length <= 1) {
        const v = variations[0]?.item_variation_data;
        rows.push({ id: variations[0]?.id || obj.id, name: itemName, sku: v?.sku || '', price: v?.price_money ? (v.price_money.amount / 100).toFixed(2) : null, category });
      } else {
        variations.forEach(variation => {
          const v = variation.item_variation_data;
          const varName = v?.name || '';
          rows.push({ id: variation.id, name: varName ? `${itemName} — ${varName}` : itemName, sku: v?.sku || '', price: v?.price_money ? (v.price_money.amount / 100).toFixed(2) : null, category });
        });
      }
    });
    renderResults(tid, rows, query);
  } catch(e) { console.error('searchCatalog error:', e); mockSearch(tid, query); }
  finally { $t(tid, 'spinner').classList.remove('active'); }
}

const MOCK = [
  { id: 'i1', name: 'Custom Engagement Ring', sku: 'RING-001', price: '850.00', category: 'Rings' },
  { id: 'i2', name: 'Argentium Silver Band', sku: 'RING-002', price: '120.00', category: 'Rings' },
  { id: 'i5', name: 'Seamless Hoop Set', sku: 'HOOP-001', price: '65.00', category: 'Hoops' },
  { id: 'i6', name: 'Permanent Bracelet — Chain', sku: 'PERM-001', price: '55.00', category: 'Permanent' },
  { id: 'i7', name: 'Ear Cuff — Small 2 Orb', sku: 'CUFF-001', price: '45.00', category: 'Ear Cuffs' },
  { id: 'i8', name: 'Ear Cuff — Large 3 Orb', sku: 'CUFF-002', price: '55.00', category: 'Ear Cuffs' },
];
function mockSearch(tid, q) {
  const lq = q.toLowerCase();
  renderResults(tid, MOCK.filter(i => i.name.toLowerCase().includes(lq) || i.sku.toLowerCase().includes(lq) || i.category.toLowerCase().includes(lq)), q);
}
function renderResults(tid, items, query) {
  const box = $t(tid, 'results'); box.innerHTML = '';
  if (!items.length) {
    box.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:0.5rem 0;text-align:center">No items matching "${query}"</div>`;
  } else {
    items.forEach(item => {
      const d = document.createElement('div'); d.className = 'result-item';
      d.innerHTML = `<div><div class="result-name">${item.name}</div><div class="result-meta">${item.category}${item.sku ? ' · ' + item.sku : ''}</div></div><div class="result-meta result-price">${item.price ? '$' + item.price : '—'}</div>`;
      d.onclick = () => selectItem(tid, item);
      box.appendChild(d);
    });
  }
  box.classList.add('visible');
}
function hideResults(tid) { $t(tid, 'results').classList.remove('visible'); $t(tid, 'results').innerHTML = ''; }

function selectItem(tid, item) {
  T[tid].selectedItem = item;
  $t(tid, 'search-input').style.display = 'none';
  hideResults(tid);
  $t(tid, 'sel-name').textContent = item.name;
  $t(tid, 'sel-meta').textContent = [item.category, item.sku, item.price ? '$' + item.price : null].filter(Boolean).join(' · ');
  $t(tid, 'selected-item').classList.add('visible');
  checkReady(tid);
}
function clearSelection(tid) {
  T[tid].selectedItem = null;
  $t(tid, 'search-input').style.display = '';
  $t(tid, 'search-input').value = '';
  $t(tid, 'selected-item').classList.remove('visible');
  checkReady(tid);
}
function checkReady(tid) {
  const hasSelections = T[tid].selectedItem && T[tid].selectedEmployee;
  const blockedByClockIn = T[tid].clockStatus === 'not-clocked-in';
  $t(tid, 'step-timer').classList.toggle('dimmed', !hasSelections);
  $t(tid, 'start-btn').disabled = !hasSelections || T[tid].running || blockedByClockIn;
}

async function checkClockIn(tid) {
  const emp = T[tid].selectedEmployee;
  if (!emp) return;
  const badge = $t(tid, 'clock-status');

  // No token — skip check silently
  if (!CFG.sqToken) { T[tid].clockStatus = 'unknown'; badge.className = 'clock-status'; return; }

  T[tid].clockStatus = 'checking';
  badge.className = 'clock-status checking visible';
  badge.textContent = '⏳ Checking clock-in status…';
  checkReady(tid);

  try {
    const data = await sq('/labor/shifts/search', {
      method: 'POST',
      body: JSON.stringify({
        query: {
          filter: {
            team_member_ids: [emp.id],
            status: 'OPEN',
            location_ids: [CFG.sqLocation]
          }
        },
        limit: 5
      })
    });
    const openShifts = (data.shifts || []).filter(s => !s.end_at);
    if (openShifts.length > 0) {
      const since = new Date(openShifts[0].start_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      T[tid].clockStatus = 'clocked-in';
      badge.className = 'clock-status clocked-in visible';
      badge.textContent = `✓ Clocked in since ${since}`;
    } else {
      T[tid].clockStatus = 'not-clocked-in';
      badge.className = 'clock-status not-clocked-in visible';
      // Debug: show raw count + any errors from Square
      const errMsg = data.errors ? data.errors.map(e => e.detail || e.code).join('; ') : '';
      badge.textContent = `⚠ ${emp.name} not clocked in (${(data.shifts||[]).length} shifts found${errMsg ? ' · ' + errMsg : ''})`;
    }
  } catch(e) {
    // API error — don't block, just note it
    T[tid].clockStatus = 'error';
    badge.className = 'clock-status error visible';
    badge.textContent = `Could not verify clock-in status: ${e.message||e}`;
  }
  checkReady(tid);
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function _runningUI(tid) {
  $t(tid, 'start-btn').style.display = 'none'; $t(tid, 'stop-btn').style.display = '';
  $t(tid, 'timer-status').textContent = 'Running';
  $t(tid, 'step-product').classList.add('dimmed'); $t(tid, 'step-employee').classList.add('dimmed');
  $t(tid, 'step-timer').classList.remove('dimmed');
  clearInterval(T[tid].tickInterval);
  T[tid].tickInterval = setInterval(() => { $t(tid, 'timer-display').textContent = fmt(Date.now() - T[tid].startTime); }, 1000);
}

function startTimer(tid) {
  T[tid].running = true; T[tid].startTime = Date.now();
  localStorage.setItem(`sts_activeTimer_${tid}`, JSON.stringify({ startTime: T[tid].startTime, item: T[tid].selectedItem, employee: T[tid].selectedEmployee }));
  _runningUI(tid);
}

function resumeTimer(tid, saved) {
  T[tid].selectedItem = saved.item; T[tid].selectedEmployee = saved.employee;
  T[tid].startTime = saved.startTime; T[tid].running = true;
  $t(tid, 'search-input').style.display = 'none';
  $t(tid, 'sel-name').textContent = saved.item.name;
  $t(tid, 'sel-meta').textContent = [saved.item.category, saved.item.sku, saved.item.price ? '$' + saved.item.price : null].filter(Boolean).join(' · ');
  $t(tid, 'selected-item').classList.add('visible');
  _runningUI(tid);
  showToast(`Timer ${tid + 1} resumed — running since ` + new Date(saved.startTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }));
}

async function stopTimer(tid) {
  clearInterval(T[tid].tickInterval);
  const totalWall = Date.now() - T[tid].startTime;
  $t(tid, 'stop-btn').disabled = true; $t(tid, 'timer-status').textContent = 'Reconciling…';
  let clockedOutMs = 0;
  if (CFG.sqToken && T[tid].selectedEmployee) {
    try {
      const from = new Date(T[tid].startTime).toISOString(), to = new Date().toISOString();
      const data = await sq(`/labor/shifts?team_member_id=${T[tid].selectedEmployee.id}&start_at_min=${from}&start_at_max=${to}`);
      const shifts = data.shifts || [];
      if (shifts.length) {
        let workedMs = 0;
        shifts.forEach(sh => { const cin = Math.max(new Date(sh.start_at).getTime(), T[tid].startTime); const cout = sh.end_at ? Math.min(new Date(sh.end_at).getTime(), Date.now()) : Date.now(); if (cout > cin) workedMs += (cout - cin); });
        clockedOutMs = Math.max(0, totalWall - workedMs);
      }
    } catch(e) { console.warn('Timecard reconcile failed:', e); }
  }
  const netMs = Math.max(0, totalWall - clockedOutMs);
  const notes = $t(tid, 'notes-input').value.trim();
  const piecesRaw = $t(tid, 'pieces-input').value.trim();
  const pieces = piecesRaw !== '' ? parseInt(piecesRaw, 10) : null;
  $t(tid, 'timer-status').textContent = 'Done';
  const session = { timerLabel: `Timer ${tid + 1}`, item: T[tid].selectedItem, employee: T[tid].selectedEmployee, totalMs: totalWall, clockedOutMs, netMs, notes, pieces, timestamp: new Date().toISOString(), saved: false, error: null };
  sessions.unshift(session); renderLog();
  showToast(`Timer ${tid + 1} — ${fmt(netMs)} recorded`);
  saveToNotion(session);
  if (session.pieces > 0 && CFG.sqToken) {
    showInventoryModal(tid, session);
  } else {
    resetTimer(tid);
  }
}

async function saveToNotion(session) {
  const payload = {
    itemName:     session.item.name,
    sku:          session.item.sku        || '',
    category:     session.item.category   || '',
    employeeName: session.employee.name,
    squareItemId: session.item.id         || '',
    totalMin:     parseFloat((session.totalMs    / 60000).toFixed(2)),
    dedMin:       parseFloat((session.clockedOutMs / 60000).toFixed(2)),
    netMin:       parseFloat((session.netMs      / 60000).toFixed(2)),
    date:         session.timestamp.slice(0, 10),
    notes:        session.notes || '',
    pieces:       session.pieces != null ? session.pieces : undefined,
  };
  try {
    const res = await fetch('/api/notion-timesession', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.ok) { session.saved = true; session.notionPageId = data.notionPageId || null; showToast('Saved to Notion ✓'); }
    else { session.error = data.error || 'Notion error ' + res.status; showToast('Notion save failed — ' + session.error, true); }
  } catch(e) { session.error = 'Network error: ' + e.message; showToast('Notion save failed', true); }
  finally { renderLog(); }
}

// ── Inventory modal ───────────────────────────────────────────────────────────
let _invTid = null, _invSession = null;

function showInventoryModal(tid, session) {
  _invTid = tid; _invSession = session;
  const modal = $g('inv-modal-backdrop');
  $g('inv-modal-item').textContent = session.item.name;
  $g('inv-modal-detail').textContent = `${session.pieces} piece${session.pieces !== 1 ? 's' : ''} · ${session.employee.name}`;
  $g('inv-modal-status').textContent = '';
  $g('inv-modal-confirm').disabled = false;
  $g('inv-modal-confirm').textContent = 'Add to Square';
  modal.style.display = 'flex';
}

async function inventoryConfirm() {
  const s = _invSession;
  const statusEl = $g('inv-modal-status');
  const confirmBtn = $g('inv-modal-confirm');
  confirmBtn.disabled = true;
  confirmBtn.textContent = 'Adding…';
  statusEl.textContent = '';

  try {
    const data = await sq('/inventory/changes/batch-create', {
      method: 'POST',
      body: JSON.stringify({
        idempotency_key: `sts-inv-${s.timestamp}-${s.item.id}`,
        changes: [{
          type: 'ADJUSTMENT',
          adjustment: {
            catalog_object_id: s.item.id,
            location_id: CFG.sqLocation,
            from_state: 'NONE',
            to_state: 'IN_STOCK',
            quantity: String(s.pieces),
            occurred_at: s.timestamp,
          }
        }]
      })
    });
    if (data.errors && data.errors.length) {
      const msg = data.errors.map(e => e.detail || e.code).join('; ');
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = '⚠ ' + msg;
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Retry';
      return;
    }
    s.inventoryAdded = s.pieces;
    try { localStorage.setItem('sts_sessions', JSON.stringify(sessions)); } catch(e) {}
    renderLog();
    showToast(`+${s.pieces} added to Square ✓`);
    inventoryDone();
  } catch(e) {
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = '⚠ Network error — ' + e.message;
    confirmBtn.disabled = false;
    confirmBtn.textContent = 'Retry';
  }
}

function inventorySkip() { inventoryDone(); }

function inventoryDone() {
  $g('inv-modal-backdrop').style.display = 'none';
  if (_invTid !== null) resetTimer(_invTid);
  _invTid = null; _invSession = null;
}

function resetTimer(tid) {
  T[tid].running = false; localStorage.removeItem(`sts_activeTimer_${tid}`);
  clearInterval(T[tid].tickInterval);
  $t(tid, 'timer-display').textContent = '00:00:00'; $t(tid, 'timer-status').textContent = '';
  $t(tid, 'stop-btn').disabled = false; $t(tid, 'start-btn').style.display = ''; $t(tid, 'stop-btn').style.display = 'none';
  $t(tid, 'step-product').classList.remove('dimmed'); $t(tid, 'step-employee').classList.remove('dimmed');
  $t(tid, 'notes-input').value = ''; $t(tid, 'pieces-input').value = ''; clearSelection(tid);
  $t(tid, 'employee-grid').querySelectorAll('.emp-btn').forEach(b => b.classList.remove('selected'));
  T[tid].selectedItem = null; T[tid].selectedEmployee = null;
  T[tid].clockStatus = 'unknown';
  $t(tid, 'clock-status').className = 'clock-status';
  checkReady(tid);
}

// ── Log ───────────────────────────────────────────────────────────────────────
function renderLog() {
  const list = $g('log-list');
  if (!sessions.length) { list.innerHTML = '<div class="log-empty">No sessions recorded yet</div>'; return; }
  list.innerHTML = sessions.map((s, i) => {
    const d = new Date(s.timestamp);
    const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    const ded    = s.clockedOutMs > 0 ? `<div class="log-ded">−${fmt(s.clockedOutMs)} clocked-out deducted</div>` : '';
    const status = s.error ? `<div class="log-err">⚠ ${s.error}</div>` : s.saved ? `<div class="log-saved">✓ Saved to Notion</div>` : `<div class="log-ded">Notion not configured</div>`;
    const timerTag = s.timerLabel ? `<span style="font-size:9px;background:rgba(201,168,76,0.15);border:1px solid var(--border);border-radius:4px;padding:1px 5px;margin-left:5px;color:var(--gold-dim)">${s.timerLabel}</span>` : '';
    const piecesTag = s.pieces != null ? `<div class="log-ded" style="color:var(--text2);">${s.pieces} piece${s.pieces !== 1 ? 's' : ''}${s.inventoryAdded ? ' · <span style="color:var(--green)">+' + s.inventoryAdded + ' added to Square ✓</span>' : ''}</div>` : '';
    return `<div class="log-entry" style="position:relative;">
      <div style="flex:1;min-width:0;">
        <div class="log-item-name">${s.item.name}${timerTag}</div>
        <div class="log-item-meta">${s.employee.name} · ${label}</div>
        ${s.notes ? `<div class="log-item-meta" style="margin-top:4px;font-style:italic">${s.notes}</div>` : ''}
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div class="log-duration">${fmt(s.netMs)}</div>
        ${piecesTag}${ded}${status}
      </div>
      <button onclick="deleteSession(${i})" title="Delete entry"
        style="position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-dim);opacity:0;transition:opacity .15s;padding:2px 5px;border-radius:4px;"
        onmouseenter="this.style.opacity=1;this.style.color='var(--red)'"
        onmouseleave="this.style.opacity=0;this.style.color='var(--text-dim)'">✕</button>
    </div>`;
  }).join('');
}

async function deleteSession(i) {
  const s = sessions[i];
  if (!s) return;
  if (!confirm(`Delete this session?\n${s.item.name} — ${s.employee.name}`)) return;

  // Archive in Notion if we have the page ID
  if (s.notionPageId) {
    try {
      await fetch(`/api/notion-timesession?pageId=${s.notionPageId}`, { method: 'DELETE' });
    } catch(e) { /* non-fatal — remove locally regardless */ }
  }

  sessions.splice(i, 1);
  try { localStorage.setItem('sts_sessions', JSON.stringify(sessions)); } catch(e) {}
  renderLog();
  showToast('Entry deleted');
}

// ── Config ────────────────────────────────────────────────────────────────────
function toggleConfig() { $g('config-body').classList.toggle('open'); }
function saveConfig() {
  CFG.sqToken     = $g('sq-token').value.trim();
  CFG.sqLocation  = $g('sq-location').value.trim() || 'D7EZ98V48F79A';
  CFG.notionToken = $g('notion-token').value.trim();
  localStorage.setItem('sts-square-token',  CFG.sqToken);
  localStorage.setItem('sts_sqLocation',    CFG.sqLocation);
  localStorage.setItem('sts_notionToken',   CFG.notionToken);
  showToast('Config saved'); loadEmployees();
}
function loadConfig() {
  CFG.sqToken     = localStorage.getItem('sts-square-token') || '';
  CFG.sqLocation  = localStorage.getItem('sts_sqLocation')   || CFG.sqLocation;
  CFG.notionToken = localStorage.getItem('sts_notionToken')  || '';
  $g('sq-token').value     = CFG.sqToken;
  $g('sq-location').value  = CFG.sqLocation;
  $g('notion-token').value = CFG.notionToken;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  buildCards();
  loadConfig();
  // Restore any running timers immediately before API calls
  for (let tid = 0; tid < NUM_TIMERS; tid++) {
    const saved = localStorage.getItem(`sts_activeTimer_${tid}`);
    if (saved) {
      try { resumeTimer(tid, JSON.parse(saved)); }
      catch(e) { console.error(`Resume timer ${tid} error:`, e); localStorage.removeItem(`sts_activeTimer_${tid}`); }
    }
  }
  // Load employees and re-highlight any active selections
  await loadEmployees();
}
boot();
</script>
