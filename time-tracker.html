<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS Work Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #4E7A94;
    --hdr: #1E3D50;
    --accent: #C9983A;
    --accent-mid: #D4AA56;
    --accent-light: #E8C878;
    --accent-bg: #FDF6E8;
    --accent-border: #E8D0A0;
    --card-bg: #FFFFFF;
    --card-head-bg: #EBF5FB;
    --bdr: #B0CDE0;
    --bdr-light: #C8DFEE;
    --text: #1A2E38;
    --text2: #4A6878;
    --text3: #6A8898;
    --text-dim: #7A9AAA;
    --green: #3A7A4A;
    --red: #A0402A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; min-height: 100vh; padding: 1.25rem 1rem 4rem; font-size: 14px; }

  .page-wrap { max-width: 640px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--bdr); }
  .wordmark { font-size: 11px; letter-spacing: 0.3em; color: var(--accent-light); text-transform: uppercase; margin-bottom: 0.3rem; font-weight: 700; }
  header h1 { font-size: 10px; letter-spacing: 0.2em; color: var(--bdr); text-transform: uppercase; font-weight: 400; }

  /* ── Search / results ── */
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; background: #fff; border: 1px solid var(--bdr); border-radius: 8px; color: var(--text); font-size: 14px; padding: 0.6rem 0.875rem 0.6rem 2.25rem; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(201,152,58,0.15); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
  .spinner { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; border: 2px solid var(--bdr); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  .results { margin-top: 0.35rem; display: none; flex-direction: column; gap: 0.3rem; max-height: 220px; overflow-y: auto; }
  .results.visible { display: flex; }
  .results::-webkit-scrollbar { width: 4px; }
  .results::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }
  .result-item { background: #fff; border: 1px solid var(--bdr-light); border-radius: 7px; padding: 0.55rem 0.875rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.15s, background 0.15s; }
  .result-item:hover { border-color: var(--accent); background: var(--accent-bg); }
  .result-name { font-size: 13px; color: var(--text); }
  .result-meta { font-size: 10px; color: var(--text3); text-align: right; white-space: nowrap; margin-left: 0.75rem; }
  .result-price { color: var(--accent); font-weight: 600; }

  /* ── Employee grid ── */
  .employee-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.35rem; }
  .emp-btn { background: #fff; border: 1px solid var(--bdr-light); border-radius: 7px; color: var(--text); font-size: 13px; padding: 0.5rem 0.75rem; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; display: flex; align-items: center; gap: 0.5rem; }
  .emp-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
  .emp-btn.selected { border-color: var(--accent); background: var(--accent-bg); font-weight: 600; }
  .emp-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--hdr); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--accent-light); flex-shrink: 0; }

  /* ── Clock-in status badge ── */
  .clock-status { display: none; margin-top: 0.5rem; font-size: 11px; font-weight: 600; padding: 0.35rem 0.75rem; border-radius: 6px; }
  .clock-status.visible { display: block; }
  .clock-status.checking { color: var(--text3); background: var(--card-head-bg); border: 1px solid var(--bdr-light); }
  .clock-status.clocked-in { color: var(--green); background: #edf7f0; border: 1px solid #b2d8bc; }
  .clock-status.not-clocked-in { color: #7a2810; background: #fdf0ec; border: 1px solid #f0b8a8; }
  .clock-status.error { color: var(--text3); background: var(--card-head-bg); border: 1px solid var(--bdr-light); }

  /* ── Setup form ── */
  .setup-form { background: var(--card-bg); border: 1px solid var(--bdr); border-radius: 12px; padding: 1rem 1.125rem; margin-bottom: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .setup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--bdr-light); }
  .setup-title { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: var(--text3); text-transform: uppercase; }
  .setup-section { margin-top: 0.75rem; }
  .setup-section-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: var(--text3); text-transform: uppercase; margin-bottom: 0.45rem; }
  .setup-footer { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.875rem; padding-top: 0.75rem; border-top: 1px solid var(--bdr-light); flex-wrap: wrap; }
  .setup-footer .start-time-input { flex-shrink: 0; flex: 1 1 auto; min-width: 0; }

  /* ── Active bar ── */
  .active-bar { background: var(--card-bg); border: 2px solid var(--accent); border-radius: 12px; padding: 0.875rem 1.125rem; margin-bottom: 0.75rem; box-shadow: 0 2px 8px rgba(201,152,58,0.15); }
  .abar-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; }
  .abar-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; animation: running-pulse 1.6s ease-in-out infinite; }
  @keyframes running-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .abar-name { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .abar-emp { font-size: 12px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
  .abar-elapsed-row { font-size: 12px; color: var(--text2); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 4px; }
  .abar-elapsed { font-weight: 700; color: var(--accent); font-size: 13px; }
  .abar-events { font-size: 12px; display: flex; flex-direction: column; gap: 2px; margin-bottom: 4px; }
  .abar-notes-toggle { font-size: 10px; color: var(--text3); cursor: pointer; letter-spacing: 0.08em; margin-top: 0.5rem; display: inline-block; }
  .abar-notes-toggle:hover { color: var(--accent); }
  .abar-notes { margin-top: 6px; }

  /* ── Shared input / button styles ── */
  .notes-input { width: 100%; background: #fff; border: 1px solid var(--bdr); border-radius: 8px; color: var(--text); font-size: 13px; padding: 0.55rem 0.875rem; outline: none; resize: none; height: 52px; transition: border-color 0.2s; }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: var(--text-dim); }
  .saving-badge { display: none; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-top: 0.5rem; }
  .saving-badge.visible { display: block; }
  .btn-save-note { background: none; border: 1px solid var(--bdr); border-radius: 6px; color: var(--text2); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.3rem 0.75rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; margin-top: 5px; }
  .btn-save-note:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save-note:disabled { opacity: 0.4; cursor: default; }
  .start-time-input { background: #fff; border: 1px solid var(--bdr); border-radius: 6px; color: var(--text); font-size: 12px; padding: 0.3rem 0.5rem; outline: none; transition: border-color 0.2s; }
  .start-time-input:focus { border-color: var(--accent); }
  .adjust-start-link { font-size: 10px; color: var(--text3); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; letter-spacing: 0.05em; transition: color 0.15s; }
  .adjust-start-link:hover { color: var(--accent); }

  .btn { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.25rem; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-start { background: var(--accent); color: #fff; }
  .btn-start:hover { background: var(--accent-mid); }
  .btn-start:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-stop { background: transparent; border: 1px solid var(--red); color: var(--red); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.45rem 1rem; border-radius: 7px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .btn-stop:hover { background: rgba(160,64,42,0.08); }
  .btn-stop:disabled { opacity: 0.4; cursor: not-allowed; }

  .resume-warning { display: none; background: #fdf3e0; border: 1px solid #e8c264; border-radius: 8px; padding: 0.6rem 0.875rem; margin-bottom: 0.6rem; font-size: 12px; color: #7a4e10; line-height: 1.5; }
  .resume-warning strong { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9a5e10; margin-bottom: 2px; }
  .resume-warning.visible { display: block; }

  /* ── Add second timer button ── */
  .add-timer-btn-wrap { text-align: center; margin-bottom: 1rem; }
  .add-timer-btn { background: none; border: 1px dashed var(--bdr); border-radius: 8px; color: var(--text3); font-size: 12px; padding: 0.5rem 1.25rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .add-timer-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Session timeline (active bar events + log bars) ── */
  .te { display: flex; align-items: baseline; gap: 6px; font-size: 12px; line-height: 1.6; }
  .te-icon { flex-shrink: 0; width: 14px; text-align: center; }
  .te-label { flex-shrink: 0; }
  .te-day { font-size: 10px; color: var(--text3); margin-left: 2px; }
  .te-time { color: var(--text3); margin-left: auto; padding-left: 8px; white-space: nowrap; }
  .te.project-start .te-icon, .te.project-start .te-label { color: var(--text); font-weight: 600; }
  .te.project-stop  .te-icon, .te.project-stop  .te-label { color: var(--text2); font-weight: 600; }
  .te.clock-in  { padding-left: 16px; }
  .te.clock-in  .te-icon, .te.clock-in  .te-label { color: var(--green); }
  .te.clock-out { padding-left: 16px; }
  .te.clock-out .te-icon, .te.clock-out .te-label { color: var(--text-dim); }

  /* ── Session bar (completed sessions) ── */
  .session-bar { background: var(--card-bg); border: 1px solid var(--bdr-light); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.5rem; }
  .sbar-header { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
  .sbar-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; }
  .sbar-emp { font-size: 11px; color: var(--text3); }
  .sbar-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .session-timeline { display: flex; flex-direction: column; gap: 1px; }
  .sbar-summary { font-size: 11px; color: var(--text2); border-top: 1px solid var(--bdr-light); padding-top: 5px; margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .sbar-net { font-weight: 700; color: var(--text); }
  .sbar-saved { color: var(--green); font-weight: 600; }
  .sbar-err { color: var(--red); }

  /* ── Log section ── */
  .log-section { border-top: 1px solid var(--bdr); padding-top: 1.25rem; margin-top: 0.25rem; }
  .log-title { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-bottom: 0.875rem; display: flex; justify-content: space-between; align-items: center; }
  .notion-link { font-size: 11px; color: rgba(255,255,255,0.85); text-decoration: none; border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; padding: 3px 9px; transition: border-color 0.15s, color 0.15s, background 0.15s; }
  .notion-link:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.08); }
  .log-empty { font-size: 13px; color: var(--text-dim); text-align: center; padding: 1.25rem 0; }

  /* ── Edit form ── */
  .log-edit-row { background: var(--card-head-bg); border: 1px solid var(--bdr); border-radius: 8px; padding: 10px 12px; margin-top: 6px; display: flex; flex-direction: column; gap: 8px; }
  .log-edit-field { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
  .log-edit-field label { width: 52px; font-weight: 600; color: var(--text3); flex-shrink: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .log-edit-input { background: #fff; border: 1px solid var(--bdr); border-radius: 6px; color: var(--text); font-size: 12px; padding: 4px 7px; outline: none; transition: border-color 0.2s; }
  .log-edit-input:focus { border-color: var(--accent); }
  .log-del-btn { background: none; border: 1px solid var(--bdr-light); border-radius: 5px; cursor: pointer; color: var(--text-dim); font-size: 12px; padding: 2px 6px; line-height: 1; transition: border-color 0.15s, color 0.15s, background 0.15s; flex-shrink: 0; }
  .log-del-btn:hover { border-color: var(--red); color: var(--red); background: #fdf0ec; }
  .log-sync-btn { background: none; border: 1px solid var(--bdr-light); border-radius: 5px; cursor: pointer; color: var(--text-dim); font-size: 11px; padding: 2px 6px; line-height: 1; transition: border-color 0.15s, color 0.15s, background 0.15s; flex-shrink: 0; }
  .log-sync-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .log-sync-btn:disabled { opacity: 0.5; cursor: default; }
  .log-edit-btn { background: none; border: 1px solid var(--bdr-light); border-radius: 5px; cursor: pointer; color: var(--text-dim); font-size: 11px; padding: 2px 6px; line-height: 1; transition: border-color 0.15s, color 0.15s, background 0.15s; flex-shrink: 0; }
  .log-edit-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .sbar-time-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); margin-bottom: 6px; flex-wrap: wrap; }
  .sbar-time-val { color: var(--text2); font-weight: 500; }
  @keyframes pulse-gold { 0%,100% { box-shadow: 0 0 0 0 rgba(201,152,58,0); } 50% { box-shadow: 0 0 0 6px rgba(201,152,58,0.35); } }
  .btn-pulse { animation: pulse-gold 0.9s ease 4; }

  /* ── Config ── */
  .config-panel { margin-top: 2rem; border-top: 1px solid var(--bdr); padding-top: 1.25rem; }
  .config-toggle { background: none; border: none; color: var(--text3); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0; transition: color 0.15s; }
  .config-toggle:hover { color: var(--text2); }
  .config-body { display: none; margin-top: 1rem; flex-direction: column; gap: 0.75rem; max-width: 480px; }
  .config-body.open { display: flex; }
  .config-row { display: flex; flex-direction: column; gap: 0.35rem; }
  .config-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .config-input { background: #fff; border: 1px solid var(--bdr); border-radius: 6px; color: var(--text); font-size: 13px; padding: 0.55rem 0.875rem; outline: none; width: 100%; transition: border-color 0.2s; }
  .config-input:focus { border-color: var(--accent); }
  .config-hint { font-size: 11px; color: var(--text3); line-height: 1.5; }
  .config-save { background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.55rem 1.25rem; cursor: pointer; align-self: flex-start; transition: background 0.15s; }
  .config-save:hover { background: var(--accent-mid); }

  /* ── Inventory modal ── */
  .inv-size-row { display: flex; align-items: center; gap: 8px; background: var(--card-head-bg); border: 1px solid var(--bdr-light); border-radius: 7px; padding: 7px 10px; }
  .inv-size-row-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .inv-size-row-qty { font-size: 13px; color: var(--accent); font-weight: 700; white-space: nowrap; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--hdr); border: 1px solid #2E5C78; border-radius: 8px; padding: 0.7rem 1.25rem; font-size: 13px; color: #fff; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 100; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: rgba(160,64,42,0.6); color: #e07050; }
</style>
</head>
<body>
<div class="page-wrap">
  <header>
    <div class="wordmark">Stones Throw Studio</div>
    <h1>Work Timer</h1>
  </header>

  <!-- Bars panel -->
  <div id="bars-panel">
    <!-- injected by buildBars() -->
  </div>

  <div class="log-section">
    <div class="log-title">
      <span>Session log</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="sync-all-btn" onclick="syncAllSessions()" style="background:none;border:1px solid rgba(255,255,255,0.4);border-radius:6px;color:rgba(255,255,255,0.85);font-size:11px;font-weight:600;letter-spacing:0.08em;padding:3px 10px;cursor:pointer;transition:border-color 0.15s,color 0.15s;" title="Sync all sessions with Square shifts">⟳ Sync All</button>
        <a class="notion-link" href="https://app.notion.com/p/e59ae574e5ee4d569395e15bd56450e9" target="_blank">Open in Notion ↗</a>
      </div>
    </div>
    <div id="log-list"><div class="log-empty">No sessions recorded yet</div></div>
  </div>

  <div class="config-panel">
    <button class="config-toggle" onclick="toggleConfig()">⚙ API settings</button>
    <div class="config-body" id="config-body">
      <div style="font-size:12px;color:var(--text3);padding:0.25rem 0 0.5rem;">Square token is read from ⚙ Integrations in the main app.</div>
      <div class="config-row">
        <label class="config-label">Square Access Token</label>
        <input class="config-input" id="sq-token" type="password" placeholder="sq0atp-…" autocomplete="off">
      </div>
      <div class="config-row">
        <label class="config-label">Square Location ID</label>
        <input class="config-input" id="sq-location" type="text" placeholder="D7EZ98V48F79A">
      </div>
      <div class="config-row">
        <label class="config-label">Notion Integration Token</label>
        <input class="config-input" id="notion-token" type="password" placeholder="secret_…" autocomplete="off">
        <span class="config-hint">Share the STS Work Sessions database with your Notion integration.</span>
      </div>
      <button class="config-save" onclick="saveConfig()">Save &amp; reload</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ── Inventory confirmation modal ── -->
<div id="inv-modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:16px;">
  <div style="background:var(--card-bg);border-radius:14px;padding:24px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.25);">
    <div style="font-size:13px;font-weight:700;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px;">📦 Add to Square Inventory?</div>
    <div id="inv-modal-item" style="margin-bottom:4px;"></div>
    <div id="inv-modal-detail" style="font-size:13px;color:var(--text2);margin-bottom:16px;"></div>
    <div id="inv-size-picker" style="display:none;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;color:var(--text2);text-transform:uppercase;margin-bottom:8px;">Which sizes did you make?</div>
      <div id="inv-size-rows" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;min-height:4px;"></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <select id="inv-size-select" style="flex:1;min-width:110px;background:#fff;border:1px solid var(--bdr);border-radius:6px;color:var(--text);font-size:13px;padding:0.45rem 0.6rem;outline:none;"><option value="">Select size…</option></select>
        <input type="number" id="inv-size-qty" min="1" placeholder="Qty" style="width:56px;background:#fff;border:1px solid var(--bdr);border-radius:6px;color:var(--text);font-size:13px;padding:0.45rem 0.6rem;outline:none;-moz-appearance:textfield;">
        <button onclick="addSizeRow()" style="background:var(--hdr);color:var(--accent-light);border:none;border-radius:6px;font-size:12px;font-weight:700;padding:0.45rem 0.875rem;cursor:pointer;letter-spacing:0.05em;white-space:nowrap;">+ Add</button>
      </div>
    </div>

async function resolveLocalVariantIds(localParent, sizeRows) {
  try {
    const terms = localParent.squareSearchTerms || [localParent.name];
    const searchData = await sq('/catalog/search', { method: 'POST', body: JSON.stringify({ object_types: ['ITEM'], query: { text_query: { keywords: terms } }, limit: 10 }) });
    const found = searchData.objects || [];
    if (!found.length) return null;
    const fullData = await sq('/catalog/batch-retrieve', { method: 'POST', body: JSON.stringify({ object_ids: found.map(o => o.id) }) });
    const squareItem = (fullData.objects || []).find(obj =>
      terms.some(t => (obj.item_data?.name || '').toLowerCase().includes(t.toLowerCase()))
    );
    if (!squareItem) return null;
    const variations = squareItem.item_data?.variations || [];
    const resolved = sizeRows.map(row => {
      const match = variations.find(v => (v.item_variation_data?.name || '').toLowerCase() === row.name.toLowerCase());
      return match ? { ...row, squareId: match.id } : null;
    }).filter(Boolean);
    return resolved.length ? resolved : null;
  } catch(e) {
    console.warn('resolveLocalVariantIds failed:', e);
    return null;
  }
}

function sq(path, opts = {}) {
  const payload = { path: '/v2' + path, method: opts.method || 'GET', body: opts.body ? JSON.parse(opts.body) : undefined };
  if (CFG.sqToken) payload.token = CFG.sqToken;
  return fetch('/api/square', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).then(r => r.json());

// ── Shift log formatter ──────────────────────────────────────────────────────
function _formatShiftLog(shifts, projectStartMs, projectStopMs) {
  if (!shifts.length) return '';
  const pStart = projectStartMs, pStop = projectStopMs || Date.now();
  const fTime = iso => new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const byDay = {};
  shifts.forEach(sh => {
    const cin  = Math.max(new Date(sh.start_at).getTime(), pStart);
    const cout = sh.end_at ? Math.min(new Date(sh.end_at).getTime(), pStop) : pStop;
    if (cout <= cin) return;
    const dayKey = new Date(cin).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const hrs = ((cout - cin) / 3600000).toFixed(1);
    const entry = `${fTime(new Date(cin).toISOString())} – ${fTime(new Date(cout).toISOString())} (${hrs} hr)`;
    (byDay[dayKey] = byDay[dayKey] || []).push(entry);
  });
  return '— Shift Log —\n' + Object.entries(byDay).map(([day, entries]) => `${day}: ${entries.join(', ')}`).join('\n');
}

  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ── Catalog search ────────────────────────────────────────────────────────────
async function searchCatalog(tid, query) {
  $t(tid, 'spinner').classList.add('active');
  try {
    const searchData = await sq('/catalog/search', { method: 'POST', body: JSON.stringify({ object_types: ['ITEM'], query: { text_query: { keywords: [query] } }, limit: 20 }) });
    const localMatches = searchLocalItems(query);
    const found = searchData.objects || [];
    if (!found.length) { renderResults(tid, localMatches, query); return; }
    const fullData = await sq('/catalog/batch-retrieve', { method: 'POST', body: JSON.stringify({ object_ids: found.map(o => o.id) }) });
    const rows = [...localMatches];
    (fullData.objects || []).forEach(obj => {
      const itemName  = obj.item_data?.name || 'Unnamed';
      const category  = obj.item_data?.category_name || '';
      const variations = obj.item_data?.variations || [];
      if (variations.length <= 1) {
        const v = variations[0]?.item_variation_data;
        rows.push({ id: variations[0]?.id || obj.id, name: itemName, sku: v?.sku || '', price: v?.price_money ? (v.price_money.amount/100).toFixed(2) : null, category, isParent: false });
      } else {
        rows.push({ id: obj.id, name: itemName, category, isParent: true, variantCount: variations.length,
          variants: variations.map(v => ({ id: v.id, name: v.item_variation_data?.name || '', sku: v.item_variation_data?.sku || '', price: v.item_variation_data?.price_money ? (v.item_variation_data.price_money.amount/100).toFixed(2) : null })) });
      }
    });
    renderResults(tid, rows, query);
  } catch(e) { renderResults(tid, [], '⚠ ' + (e.message || e)); }
  finally { $t(tid, 'spinner').classList.remove('active'); }
}

function renderResults(tid, items, query) {
  const box = $t(tid, 'results'); box.innerHTML = '';
  if (!items.length) {
    const noMatch = document.createElement('div');
    noMatch.style.cssText = 'font-size:12px;color:var(--text-dim);padding:0.4rem 0 0.2rem;text-align:center';
    noMatch.textContent = `No Square catalog match for "${query}"`;
    const customBtn = document.createElement('div');
    customBtn.className = 'result-item';
    customBtn.style.cssText = 'justify-content:center;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;';
    customBtn.textContent = `+ Use "${query}" as custom item`;
    customBtn.onclick = () => selectCustomItem(tid, query);
    box.appendChild(noMatch);
    box.appendChild(customBtn);
  } else {
    items.forEach(item => {
      const d = document.createElement('div'); d.className = 'result-item';
      d.innerHTML = item.isParent
        ? `<div><div class="result-name">${item.name}</div><div class="result-meta">${item.category} · ${item.variantCount} sizes</div></div><div class="result-meta" style="color:var(--accent);font-weight:600;white-space:nowrap;">sizes at stop →</div>`
        : `<div><div class="result-name">${item.name}</div><div class="result-meta">${item.category}${item.sku ? ' · '+item.sku : ''}</div></div><div class="result-meta result-price">${item.price ? '$'+item.price : '—'}</div>`;
      d.onclick = () => selectItem(tid, item);
      box.appendChild(d);
    });
  }
  box.classList.add('visible');
}
function hideResults(tid) { $t(tid,'results').classList.remove('visible'); $t(tid,'results').innerHTML=''; }

function selectCustomItem(tid, name) {
  const customItem = { id: 'custom-' + Date.now(), name, category: 'Custom', isCustom: true, pieces: null };

}

function selectItem(tid, item) {

}
function removeItem(tid, itemId) {

}
function renderSelectedItems(tid) {

function checkReady(tid) {
  const ok = T[tid].selectedItems.length > 0 && T[tid].selectedEmployee;
  $t(tid,'start-btn').disabled = !ok || T[tid].running || T[tid].clockStatus === 'not-clocked-in';
}

// ── Shift log → active bar events ─────────────────────────────────────────────
function renderShiftLog(tid) {
  const el = $g('abar-events-' + tid); if (!el) return;
  const events = T[tid].shiftEvents;
  if (!events.length) { el.innerHTML = ''; return; }
  el.innerHTML = events.map(e => {
    const t = new Date(e.time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const d = new Date(e.time).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    if (e.type === 'in')  return `<div class="te clock-in"><span class="te-icon">▶</span><span class="te-label">Clocked in</span><span class="te-time">${d} ${t}</span></div>`;
    if (e.type === 'out') return `<div class="te clock-out"><span class="te-icon">⏸</span><span class="te-label">Clocked out</span><span class="te-time">${d} ${t}</span></div>`;
    return '';
  }).join('');
}

async function loadShiftsForTimer(tid) {
  if (!CFG.sqToken || !T[tid].selectedEmployee || !T[tid].startTime) return;
  try {
    const pStart = T[tid].startTime;
    const pStop  = Date.now();
    const data = await sq('/labor/shifts/search', { method: 'POST', body: JSON.stringify({
      query: { filter: { team_member_ids: [T[tid].selectedEmployee.id], location_ids: [CFG.sqLocation] } }, limit: 100
    })});
    const shifts = (data.shifts || [])
      .filter(sh => {
        const cin  = new Date(sh.start_at).getTime();
        const cout = sh.end_at ? new Date(sh.end_at).getTime() : pStop;
        return cin < pStop && cout > pStart;
      })
      .sort((a, b) => new Date(a.start_at) - new Date(b.start_at));
    T[tid].shiftEvents = [];
    shifts.forEach(sh => {
      const cin = new Date(sh.start_at).getTime();
      if (cin >= pStart) T[tid].shiftEvents.push({ time: cin, type: 'in' });
      if (sh.end_at) T[tid].shiftEvents.push({ time: new Date(sh.end_at).getTime(), type: 'out' });
    });
    T[tid].shiftEvents.sort((a, b) => a.time - b.time);
    renderShiftLog(tid);
  } catch(e) { console.warn('loadShiftsForTimer failed:', e); }
}

function _applyClockBadge(tid, openShift) {
  const badge = $t(tid,'clock-status'); if (!badge) return;
  if (openShift) {
    T[tid].clockStatus = 'clocked-in'; badge.className = 'clock-status clocked-in visible';
    badge.textContent = `✓ Clocked in since ${new Date(openShift.start_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
  } else {
    T[tid].clockStatus = 'not-clocked-in'; badge.className = 'clock-status not-clocked-in visible';
    badge.textContent = `⏸ Not clocked in`;
  }
  checkReady(tid);
}

async function checkClockIn(tid) {
  const emp = T[tid].selectedEmployee; if (!emp) return;
  const badge = $t(tid,'clock-status');
  if (!CFG.sqToken) { T[tid].clockStatus='unknown'; badge.className='clock-status'; return; }
  T[tid].clockStatus='checking'; badge.className='clock-status checking visible'; badge.textContent='⏳ Checking…'; checkReady(tid);
  try {
    const data = await sq('/labor/shifts/search', { method:'POST', body: JSON.stringify({ query:{ filter:{ team_member_ids:[emp.id], status:'OPEN', location_ids:[CFG.sqLocation] } }, limit:1 }) });
    const open = (data.shifts||[]).find(s => !s.end_at) || null;
    _applyClockBadge(tid, open);
    _lastShift[tid] = !!open;
  } catch(e) { T[tid].clockStatus='error'; badge.className='clock-status error visible'; badge.textContent=`Could not verify clock-in: ${e.message||e}`; }
  checkReady(tid);
}

async function patchActiveShiftLog(tid) {
  const pageId = T[tid].notionPageId; if (!pageId) return;
  const fTime = ms => new Date(ms).toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
  const fDay  = ms => new Date(ms).toLocaleDateString('en-US', {weekday:'long',month:'short',day:'numeric'});
  const byDay = {};
  T[tid].shiftEvents.forEach(e => { const d = fDay(e.time); (byDay[d]=byDay[d]||[]).push(e); });
  const shiftLog = '— Session Timeline —\n' + Object.entries(byDay).map(([day, es]) =>
    day + '\n' + es.map(e => {
      const label = e.type==='start' ? '▶ Timer Start' : e.type==='stop' ? '⏹ Timer Stop' : e.type==='in' ? '  ▶ Clock In' : '  ⏸ Clock Out';
      return `  ${label}: ${fTime(e.time)}`;
    }).join('\n')
  ).join('\n');
  const userNotes = ($t(tid,'notes-input')?.value||'').trim();
  try {
    await fetch('/api/notion-timesession', {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pageId, notes: [userNotes, shiftLog].filter(Boolean).join('\n\n') }),
    });
  } catch(e) { console.warn('patchActiveShiftLog failed:', e); }
}

async function pollShifts() {
  if (!CFG.sqToken) return;
  for (let tid = 0; tid < NUM_TIMERS; tid++) {
    const emp = T[tid].selectedEmployee; if (!emp) continue;
    try {
      const data = await sq('/labor/shifts/search', { method:'POST', body: JSON.stringify({ query:{ filter:{ team_member_ids:[emp.id], status:'OPEN', location_ids:[CFG.sqLocation] } }, limit:1 }) });
      const openShift = (data.shifts||[]).find(s => !s.end_at) || null;
      const nowOpen = !!openShift;
      const wasOpen = _lastShift[tid];
      if (T[tid].running) {
        if (wasOpen && !nowOpen) {
          T[tid].shiftEvents.push({ time: Date.now(), type: 'out' });
          renderShiftLog(tid);
          showToast(`${emp.name} clocked out`);
          patchActiveShiftLog(tid);
        } else if (!wasOpen && nowOpen && T[tid].running) {
          T[tid].shiftEvents.push({ time: Date.now(), type: 'in' });
          renderShiftLog(tid);
          patchActiveShiftLog(tid);
        }
      } else {
        _applyClockBadge(tid, openShift);
      }
      _lastShift[tid] = nowOpen;
    } catch(e) { console.warn(`Shift poll tid=${tid}:`, e); }
  }
}

// ── Timer ────────────────────────────────────────────────────────────────────
function _runningUI(tid) {
  // Hide setup, show active bar
  $g('setup-' + tid).style.display = 'none';
  if (tid === 1) { _setup1Visible = false; }
  $g('active-bar-' + tid).style.display = '';
  _updateAddBtn();
  // Populate bar
  $g('abar-name-' + tid).textContent = T[tid].selectedItems.map(i => i.name).join(', ') || '—';
  $g('abar-emp-' + tid).textContent = T[tid].selectedEmployee?.name || '';
  $g('abar-start-lbl-' + tid).textContent = new Date(T[tid].startTime).toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
  // Elapsed minutes ticker (updates every 30s)
  clearInterval(T[tid].tickInterval);
  const updateElapsed = () => {
    $g('abar-elapsed-' + tid).textContent = fmtElapsed(Date.now() - T[tid].startTime);
  };
  updateElapsed();
  T[tid].tickInterval = setInterval(updateElapsed, 30000);
  // Show adjust-start link
  $t(tid,'adjust-wrap').style.display = '';
}

function startTimer(tid) {
  T[tid].running = true;
  T[tid].startTime = parseTimeInput($t(tid,'start-time-input')?.value) || Date.now();
  localStorage.setItem(`sts_activeTimer_${tid}`, JSON.stringify({ startTime: T[tid].startTime, items: T[tid].selectedItems, employee: T[tid].selectedEmployee }));
  T[tid].shiftEvents = [];
  createActiveSession(tid);
  loadShiftsForTimer(tid);
  _runningUI(tid);
}

function resumeTimer(tid, saved) {
  T[tid].selectedItems    = saved.items || (saved.item ? [{ ...saved.item, pieces:null }] : []);
  T[tid].selectedEmployee = saved.employee;
  T[tid].startTime        = saved.startTime;
  T[tid].running          = true;
  if (saved.notionPageId) { T[tid].notionPageId = saved.notionPageId; localStorage.setItem(`sts_notionPageId_${tid}`, saved.notionPageId); }
  renderSelectedItems(tid); _runningUI(tid);
  loadShiftsForTimer(tid);
  const elapsed = Date.now() - saved.startTime;
  const startDate = new Date(saved.startTime);
  const isDifferentDay = startDate.toDateString() !== new Date().toDateString();
  if (isDifferentDay || elapsed > 12*3600*1000) {
    const label = isDifferentDay
      ? startDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' at ' + startDate.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
      : startDate.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    $t(tid,'resume-warning-msg').textContent = ` Started ${label} — ${Math.round(elapsed/3600000)} hrs ago. Verify the time before saving.`;
    $t(tid,'resume-warning').classList.add('visible');
  }
  showToast(`Timer ${tid+1} resumed — running since ${new Date(saved.startTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`);
}

async function stopTimer(tid) {
  clearInterval(T[tid].tickInterval);
  const stopTime  = new Date().toISOString();
  const startTime = new Date(T[tid].startTime).toISOString();
  localStorage.removeItem(`sts_activeTimer_${tid}`);
  localStorage.removeItem(`sts_notionPageId_${tid}`);
  const totalWall = Date.now() - T[tid].startTime;
  $t(tid,'stop-btn').disabled = true; $t(tid,'stop-btn').textContent = 'Saving…';
  let clockedOutMs = 0;
  let shifts = [];
  if (CFG.sqToken && T[tid].selectedEmployee) {
    try {
      const pStart = T[tid].startTime;
      const pStop  = new Date(stopTime).getTime();
      const data = await sq('/labor/shifts/search', { method: 'POST', body: JSON.stringify({
        query: { filter: { team_member_ids: [T[tid].selectedEmployee.id], location_ids: [CFG.sqLocation] } }, limit: 100
      })});
      shifts = (data.shifts || []).filter(sh => {
        const cin  = new Date(sh.start_at).getTime();
        const cout = sh.end_at ? new Date(sh.end_at).getTime() : pStop;
        return cin < pStop && cout > pStart;
      });
      if (shifts.length) {
        let workedMs = 0;
        shifts.forEach(sh => { const cin = Math.max(new Date(sh.start_at).getTime(), pStart); const cout = sh.end_at ? Math.min(new Date(sh.end_at).getTime(), pStop) : pStop; if (cout > cin) workedMs += (cout-cin); });
        clockedOutMs = Math.max(0, totalWall - workedMs);
      }
    } catch(e) { console.warn('Timecard reconcile failed:', e); }
  }
  clockedOutMs += 15 * 60000;
  const netMs = Math.max(0, totalWall - clockedOutMs);
  const shiftLog = _formatShiftLog(shifts, T[tid].startTime, new Date(stopTime).getTime());
  const notes = $t(tid,'notes-input')?.value.trim() || '';
  const items = T[tid].selectedItems.map((item, idx) => {
    if (item.isParent) return { ...item, pieces: null };
    const inp = $t(tid, `pieces-${idx}`);
    return { ...item, pieces: inp && inp.value.trim() !== '' ? parseInt(inp.value.trim(), 10) : null };
  });
  const pStartMs = T[tid].startTime;
  const pStopMs  = new Date(stopTime).getTime();
  const shiftEvents = [{ time: pStartMs, type: 'start' }];
  shifts.sort((a,b) => new Date(a.start_at)-new Date(b.start_at)).forEach(sh => {
    const cin  = new Date(sh.start_at).getTime();
    const cout = sh.end_at ? new Date(sh.end_at).getTime() : pStopMs;
    if (cin  > pStartMs && cin  < pStopMs) shiftEvents.push({ time: cin,  type: 'in'  });
    if (cout > pStartMs && cout < pStopMs) shiftEvents.push({ time: cout, type: 'out' });
  });
  shiftEvents.push({ time: pStopMs, type: 'stop' });
  const session = { timerLabel:`Timer ${tid+1}`, tid, notionPageId: T[tid].notionPageId, items, employee: T[tid].selectedEmployee, startTime, stopTime, totalMs: totalWall, clockedOutMs, netMs, notes, shiftLog, shiftEvents, timestamp: stopTime, saved: false, error: null };
  sessions.unshift(session); renderLog();
  showToast(`Timer ${tid+1} — ${fmtDur(netMs)} recorded`);
  finalizeNotionSession(session);
  const hasParent = items.some(it => it.isParent);
  const hasPieces = items.some(it => !it.isParent && !it.isLocal && it.pieces > 0);
  if (hasParent || (hasPieces && CFG.sqToken)) { showInventoryModal(tid, session); } else { resetTimer(tid); }
}

async function finalizeNotionSession(session) {
  let pageId = session.notionPageId;
  if (!pageId) {
    try {
      const items = session.items || [];
      const res = await fetch('/api/notion-timesession', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          itemName: items[0]?.name || '', sku: items[0]?.sku || '',
          category: items[0]?.category || '', employeeName: session.employee?.name || '',
          squareItemId: items[0]?.id || '',
          date: session.startTime ? session.startTime.slice(0, 10) : new Date().toISOString().slice(0, 10),
          notes: session.notes || '', startTime: session.startTime || null,
        }),
      });
      const d = await res.json();
      if (res.ok) { pageId = d.notionPageId; session.notionPageId = pageId; }
      else { session.error = d.error || 'Notion create failed'; renderLog(); return; }
    } catch(e) { session.error = 'Network error: ' + e.message; renderLog(); return; }
  }
  const totalPcs = (session.items||[]).reduce((acc,it) => acc+(it.pieces||0), 0);
  // Build Session Timeline from shiftEvents (always has start+stop even with no Square shifts)
  const _fTime = ms => new Date(ms).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const _fDay  = ms => new Date(ms).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const _byDay = {};
  (session.shiftEvents||[]).forEach(e => { const d=_fDay(e.time); (_byDay[d]=_byDay[d]||[]).push(e); });
  const timelineBlock = Object.keys(_byDay).length
    ? '— Session Timeline —\n' + Object.entries(_byDay).map(([day,es]) =>
        day+'\n'+es.map(e => {
          const lbl = e.type==='start'?'▶ Timer Start':e.type==='stop'?'⏹ Timer Stop':e.type==='in'?'  ▶ Clock In':'  ⏸ Clock Out';
          return `  ${lbl}: ${_fTime(e.time)}`;
        }).join('\n')
      ).join('\n')
    : (session.shiftLog||'');
  try {
    const res = await fetch('/api/notion-timesession', {
      method: 'PATCH', headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        pageId, startTime: session.startTime, stopTime: session.stopTime,
        totalMin: parseFloat((session.totalMs/60000).toFixed(2)),
        dedMin:   parseFloat((session.clockedOutMs/60000).toFixed(2)),
        netMin:   parseFloat((session.netMs/60000).toFixed(2)),
        notes: [session.notes, timelineBlock].filter(Boolean).join('\n\n'),
        ...(totalPcs > 0 ? { pieces: totalPcs } : {}),
      }),
    });
    if (res.ok) { session.saved = true; showToast('Saved to Notion ✓'); }
    else { const d = await res.json(); session.error = d.error || 'Notion error'; showToast('Notion save failed', true); }
  } catch(e) { session.error = 'Network error: '+e.message; showToast('Notion save failed', true); }
  renderLog();
}

let _invTid = null, _invSession = null, _invSizeRows = [];

function addSizeRow() {
  const sel = $g('inv-size-select'), qty = parseInt($g('inv-size-qty').value, 10);

  $g('inv-size-rows').innerHTML = _invSizeRows.map(r => `
    <div class="inv-size-row">

      <span class="inv-size-row-qty">${r.qty} pc${r.qty!==1?'s':''}</span>

    </div>`).join('');

function removeSizeRow(id) {

    <div class="inv-size-row">
      <span class="inv-size-row-name">${r.name}${r.sku ? ` <span style="font-weight:400;color:var(--text3);">· ${r.sku}</span>` : ''}</span>
      <span class="inv-size-row-qty">${r.qty} pc${r.qty!==1?'s':''}</span>
      <button onclick="removeSizeRow('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-dim);padding:2px 4px;line-height:1;">✕</button>
    </div>`).join('');
  $g('inv-modal-confirm').disabled = _invSizeRows.length === 0;
}

async function inventoryConfirm() {
  const s = _invSession;
  const statusEl = $g('inv-modal-status'), confirmBtn = $g('inv-modal-confirm');
  confirmBtn.disabled = true; confirmBtn.textContent = 'Adding…'; statusEl.textContent = '';
  const parentItem = (s.items||[]).find(it => it.isParent);
  let changes;
  if (parentItem && _invSizeRows.length) {
    if (parentItem.isLocal) {
      const resolved = await resolveLocalVariantIds(parentItem, _invSizeRows);
      if (!resolved) {
        // Square IDs not resolvable — record sizes in Notion only
        const totalPcs = _invSizeRows.reduce((acc,r) => acc+r.qty, 0);
        parentItem.pieces = totalPcs; parentItem.selectedVariants = _invSizeRows;
        s.inventoryAdded = _invSizeRows.map(r=>`${r.qty}× ${r.name}`).join(', ');
        const allPcs = (s.items||[]).reduce((acc,it) => acc+(it.pieces||0), 0);
        if (allPcs > 0 && s.notionPageId) patchNotion(s.notionPageId, { pieces: allPcs });
        renderLog(); showToast('Pieces recorded in Notion (Square item not found)');
        inventoryDone(); return;
      }
      changes = resolved.map(r => ({ type:'ADJUSTMENT', adjustment:{ catalog_object_id:r.squareId, location_id:CFG.sqLocation, from_state:'NONE', to_state:'IN_STOCK', quantity:String(r.qty), occurred_at:s.timestamp } }));
    } else {
      changes = _invSizeRows.map(r => ({ type:'ADJUSTMENT', adjustment:{ catalog_object_id:r.id, location_id:CFG.sqLocation, from_state:'NONE', to_state:'IN_STOCK', quantity:String(r.qty), occurred_at:s.timestamp } }));
    }
  } else {
    changes = (s.items||[]).filter(it => !it.isParent && !it.isLocal && it.pieces>0).map(it => ({ type:'ADJUSTMENT', adjustment:{ catalog_object_id:it.id, location_id:CFG.sqLocation, from_state:'NONE', to_state:'IN_STOCK', quantity:String(it.pieces), occurred_at:s.timestamp } }));
  }
  if (!changes.length) { inventoryDone(); return; }
  try {
    const data = await sq('/inventory/changes/batch-create', { method:'POST', body: JSON.stringify({ idempotency_key:`sts-inv-${s.timestamp}`, changes }) });
    if (data.errors && data.errors.length) {
      statusEl.style.color='var(--red)'; statusEl.textContent='⚠ '+data.errors.map(e=>e.detail||e.code).join('; ');
      confirmBtn.disabled=false; confirmBtn.textContent='Retry'; return;
    }
    const totalPcs = changes.reduce((acc,c) => acc+parseInt(c.adjustment.quantity,10), 0);
    if (parentItem) { parentItem.pieces = totalPcs; parentItem.selectedVariants = _invSizeRows; s.inventoryAdded = _invSizeRows.map(r=>`${r.qty}× ${r.name}`).join(', '); }
    else { s.inventoryAdded = (s.items||[]).filter(it=>!it.isParent&&it.pieces>0).map(it=>`${it.pieces}× ${it.name}`).join(', '); }
    const allPcs = (s.items||[]).reduce((acc,it) => acc+(it.pieces||0), 0);
    if (allPcs > 0 && s.notionPageId) patchNotion(s.notionPageId, { pieces: allPcs });
    renderLog(); showToast(`+${totalPcs} piece${totalPcs!==1?'s':''} added to Square ✓`);
    inventoryDone();
  } catch(e) { statusEl.style.color='var(--red)'; statusEl.textContent='⚠ Network error — '+e.message; confirmBtn.disabled=false; confirmBtn.textContent='Retry'; }
}

// ── Session log ────────────────────────────────────────────────────────────────
function buildSessionTimeline(s) {
  // Only show clock-in/out events — start/stop are shown in the time row
  const allEvts = s.shiftEvents && s.shiftEvents.length ? s.shiftEvents : [];
  const evts = allEvts.filter(e => e.type === 'in' || e.type === 'out');
  if (!evts.length) return '';
  const fT = ms => new Date(ms).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const fD = ms => new Date(ms).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let lastDay = null;
  const rows = evts.map(e => {
    const day = fD(e.time);
    const newDay = day !== lastDay; lastDay = day;
    const cls   = e.type==='start'?'project-start':e.type==='stop'?'project-stop':e.type==='in'?'clock-in':'clock-out';
    const icon  = e.type==='start'?'▶':e.type==='stop'?'⏹':e.type==='in'?'▶':'⏸';
    const label = e.type==='start'?'Project started':e.type==='stop'?'Project stopped':e.type==='in'?'Clocked in':'Clocked out';
    const dayTag = newDay ? `<span class="te-day">${day}</span>` : '';
    return `<div class="te ${cls}"><span class="te-icon">${icon}</span><span class="te-label">${label}</span>${dayTag}<span class="te-time">${fT(e.time)}</span></div>`;
  }).join('');
  return `<div class="session-timeline">${rows}</div>`;
}

function renderLog() {
  const list = $g('log-list');
  if (!sessions.length) { list.innerHTML='<div class="log-empty">No sessions recorded yet</div>'; return; }
  list.innerHTML = sessions.map((s,i) => {
    const logItems = s.items || (s.item ? [s.item] : []);
    const totalPcs = logItems.reduce((acc,it) => acc+(it.pieces||0), 0);
    const avgMin   = totalPcs > 0 ? (s.netMs/60000/totalPcs).toFixed(1) : null;
    const sizeSummary = logItems.flatMap(it => it.selectedVariants||[]).map(v=>`${v.qty}× ${v.name}`).join(', ');
    const status = s.error
      ? `<span class="sbar-err">⚠ ${s.error}</span>`
      : s.saved ? `<span class="sbar-saved">✓ Saved</span>` : `<span style="color:var(--text-dim)">Saving…</span>`;
    const pcsText = totalPcs > 0
      ? `<span>${totalPcs} pc${totalPcs!==1?'s':''}${avgMin?` · <span style="color:var(--accent);font-weight:600;">${avgMin} min/pc</span>`:''}</span>${s.inventoryAdded?`<span style="color:var(--green)">+Square ✓</span>`:''}`
      : '';
    const isEditing = _editingSession === i;
    const curPcs = logItems.reduce((acc,it) => acc+(it.pieces||0), 0) || '';
    const editRow = isEditing ? `<div class="log-edit-row">
      <div class="log-edit-field"><label>Start</label><input class="log-edit-input" type="datetime-local" id="edit-start-${i}" value="${toDateTimeLocal(s.startTime)}"></div>
      <div class="log-edit-field"><label>Stop</label><input class="log-edit-input" type="datetime-local" id="edit-stop-${i}" value="${toDateTimeLocal(s.stopTime)}"></div>
      <div class="log-edit-field"><label>Pieces</label><input class="log-edit-input" type="number" min="0" step="1" id="edit-pcs-${i}" value="${curPcs}" placeholder="0" style="width:72px;"><span style="font-size:11px;color:var(--text3);">total</span></div>
      <div style="display:flex;gap:8px;margin-top:2px;">
        <button class="config-save" style="font-size:11px;padding:0.4rem 0.875rem;" onclick="saveEditSession(${i})">Save</button>
        <button class="btn-save-note" onclick="cancelEditSession()">Cancel</button>
      </div>
    </div>` : '';
    const timeRow = `<div class="sbar-time-row">
      <span class="sbar-time-val">▶ ${fmtDT(s.startTime)}</span>
      <span style="color:var(--bdr-light)">·</span>
      <span class="sbar-time-val">⏹ ${fmtDT(s.stopTime)}</span>
      <button class="log-edit-btn" onclick="startEditSession(${i})">✎ Edit</button>
      ${s.startTime && s.stopTime ? `<button class="log-sync-btn" id="sync-btn-${i}" onclick="syncShiftsForSession(${i})" title="Pull Square clock in/out times">⟳ Sync</button>` : ''}
    </div>`;
    return `<div class="session-bar">
      <div class="sbar-header">
        <div style="flex:1;min-width:0;">
          <div class="sbar-name">${logItems.map(it=>it.name).join(', ')}</div>
          <div class="sbar-emp">${s.employee?.name||''}</div>
        </div>
        <div class="sbar-actions">
          <button class="log-del-btn" onclick="deleteSession(${i})" title="Delete">✕</button>
        </div>
      </div>
      ${timeRow}
      ${buildSessionTimeline(s)}
      <div class="sbar-summary">
        <span class="sbar-net">Net: ${fmtDur(s.netMs)}</span>
        ${pcsText}
        ${sizeSummary ? `<span style="color:var(--text3)">${sizeSummary}</span>` : ''}
        ${s.notes ? `<span style="color:var(--text3);font-style:italic;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.notes}</span>` : ''}
        ${status}
      </div>

    </div>`;
  }).join('');
}

function startEditSession(i) { _editingSession = i; renderLog(); }

async function syncShiftsForSession(i) {
  const s = sessions[i]; if (!s || !s.startTime || !s.stopTime) return false;
  const empName = s.employee?.name || '';
  const empId = s.employee?.id || employees.find(e => e.name === empName)?.id || (employees.length === 1 ? employees[0].id : null);
  if (!empId) { showToast('Could not match employee — select the timer employee first', true); return false; }
  if (s.employee) s.employee.id = empId; else s.employee = { name: empName, id: empId };
  const btn = $g(`sync-btn-${i}`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const pStartMs = new Date(s.startTime).getTime();
    const pStopMs  = new Date(s.stopTime).getTime();
    const fTime = ms => new Date(ms).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const fDay  = ms => new Date(ms).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    const data = await sq('/labor/shifts/search', { method: 'POST', body: JSON.stringify({
      query: { filter: { team_member_ids: [empId], location_ids: [CFG.sqLocation] } }, limit: 100
    })});
    const shifts = (data.shifts || []).filter(sh => {
      const cin  = new Date(sh.start_at).getTime();
      const cout = sh.end_at ? new Date(sh.end_at).getTime() : pStopMs;
      return cin < pStopMs && cout > pStartMs;
    });
    const timeline = [{ time: pStartMs, type: 'start' }];
    shifts.sort((a,b) => new Date(a.start_at) - new Date(b.start_at)).forEach(sh => {
      const cin  = new Date(sh.start_at).getTime();
      const cout = sh.end_at ? new Date(sh.end_at).getTime() : pStopMs;
      if (cin > pStartMs && cin < pStopMs) timeline.push({ time: cin,  type: 'in'  });
      if (cout > pStartMs && cout < pStopMs) timeline.push({ time: cout, type: 'out' });
    });
    timeline.push({ time: pStopMs, type: 'stop' });
    s.shiftEvents = timeline;
    const byDay = {};
    timeline.forEach(e => { const d = fDay(e.time); (byDay[d]=byDay[d]||[]).push(e); });
    const notionBlock = '— Session Timeline —\n' + Object.entries(byDay).map(([day, es]) =>
      day + '\n' + es.map(e => {
        const label = e.type==='start' ? '▶ Timer Start' : e.type==='stop' ? '⏹ Timer Stop' : e.type==='in' ? '  ▶ Clock In' : '  ⏸ Clock Out';
        return `  ${label}: ${fTime(e.time)}`;
      }).join('\n')
    ).join('\n');
    s.shiftLog = notionBlock;
    const totalMs = pStopMs - pStartMs;
    let workedMs = 0;
    shifts.forEach(sh => {
      const cin  = Math.max(new Date(sh.start_at).getTime(), pStartMs);
      const cout = Math.min(sh.end_at ? new Date(sh.end_at).getTime() : pStopMs, pStopMs);
      if (cout > cin) workedMs += (cout - cin);
    });
    const clockedOutMs = Math.max(0, totalMs - workedMs) + 15 * 60000;
    const netMs = Math.max(0, totalMs - clockedOutMs);
    s.totalMs = totalMs; s.clockedOutMs = clockedOutMs; s.netMs = netMs;
    renderLog();
    if (!shifts.length) showToast('No Square shifts found — showing timer start/stop only');
    const pageId = s.notionPageId || (s.notionPageIds||[])[0];
    if (pageId) {
      const notes = [s.notes, notionBlock].filter(Boolean).join('\n\n');
      const totalPcs = (s.items||[]).reduce((acc,it) => acc+(it.pieces||0), 0);
      const nr = await fetch('/api/notion-timesession', {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ pageId, notes,
          totalMin: parseFloat((totalMs/60000).toFixed(2)),
          dedMin:   parseFloat((clockedOutMs/60000).toFixed(2)),
          netMin:   parseFloat((netMs/60000).toFixed(2)),
          ...(totalPcs > 0 ? { pieces: totalPcs } : {}),
        }),
      });
      if (!nr.ok) { const nd = await nr.json().catch(()=>({})); showToast('Notion error: ' + (nd.error||nr.status), true); if (btn) { btn.disabled=false; btn.textContent='⟳'; } return false; }
      showToast('Timeline & times synced to Notion ✓');
    } else {
      showToast('Timeline saved locally (no Notion page linked)');
    }
    if (btn) { btn.disabled = false; btn.textContent = '⟳'; }
    return true;
  } catch(e) { showToast('Shift sync failed: ' + e.message, true); if (btn) { btn.disabled=false; btn.textContent='⟳'; } return false; }
}

async function syncAllSessions() {
  const btn = $g('sync-all-btn'); if (btn) { btn.disabled = true; btn.textContent = '⟳ Syncing…'; }
  const eligible = sessions.map((s,i) => ({s,i})).filter(({s}) => s.startTime && s.stopTime);
  let done = 0, tried = 0;
  for (const {i} of eligible) {
    tried++;
    const ok = await syncShiftsForSession(i);
    if (ok) done++;
    if (btn) btn.textContent = `⟳ ${tried}/${eligible.length}…`;
  }
  if (btn) { btn.disabled = false; btn.textContent = '⟳ Sync All'; }
  const failed = tried - done;
  if (failed > 0) showToast(`Synced ${done}/${tried} sessions — ${failed} failed`, true);
  else showToast(`Synced ${done} session${done!==1?'s':''} ✓`);
}

async function saveEditSession(i) {
  const s = sessions[i]; if (!s) return;
  const startVal = $g(`edit-start-${i}`)?.value;
  const stopVal  = $g(`edit-stop-${i}`)?.value;
  const pcsVal   = $g(`edit-pcs-${i}`)?.value;
  if (!startVal || !stopVal) { showToast('Both start and stop times are required', true); return; }
  const newStart = new Date(startVal).toISOString();
  const newStop  = new Date(stopVal).toISOString();
  if (new Date(newStop) <= new Date(newStart)) { showToast('Stop time must be after start time', true); return; }
  const totalMs = new Date(newStop) - new Date(newStart);
  const netMs   = Math.max(0, totalMs - (s.clockedOutMs || 0));
  const newPcs  = pcsVal !== '' && pcsVal != null ? parseInt(pcsVal, 10) : null;
  s.startTime = newStart; s.stopTime = newStop; s.totalMs = totalMs; s.netMs = netMs;
  s.timestamp = newStop;
  if (s.items?.length) { s.items[0].pieces = newPcs; }
  // Rebuild shiftEvents start/stop anchors
  if (s.shiftEvents?.length) {
    s.shiftEvents = s.shiftEvents.filter(e => e.type !== 'start' && e.type !== 'stop');
    s.shiftEvents.unshift({ time: new Date(newStart).getTime(), type: 'start' });
    s.shiftEvents.push({ time: new Date(newStop).getTime(), type: 'stop' });
    s.shiftEvents.sort((a,b) => a.time - b.time);
  }
  _editingSession = null;
  renderLog();
  const pageId = s.notionPageId || (s.notionPageIds||[])[0];
  const patch = {
    startTime: newStart, stopTime: newStop,
    totalMin: parseFloat((totalMs/60000).toFixed(2)),
    netMin:   parseFloat((netMs/60000).toFixed(2)),
    ...(newPcs != null ? { pieces: newPcs } : {}),
  };
  if (pageId) { await patchNotion(pageId, patch); showToast('Session updated ✓'); }
  else { showToast('Updated locally (no Notion page linked)'); }
}

async function deleteSession(i) {
  const s = sessions[i]; if (!s) return;
  const logItems = s.items||(s.item?[s.item]:[]);
  if (!confirm(`Delete this session?\n${logItems.map(it=>it.name).join(', ')||'?'} — ${s.employee?.name||''}`)) return;
  const pageIds = s.notionPageId ? [s.notionPageId] : (s.notionPageIds||[]);
  for (const pid of pageIds) { if (!pid) continue; try { await fetch(`/api/notion-timesession?pageId=${pid}`,{method:'DELETE'}); } catch(e){} }
  if (_editingSession === i) _editingSession = null;
  sessions.splice(i,1); renderLog(); showToast('Entry deleted');
}

async function loadSessionsFromNotion() {
  try {
    const res = await fetch('/api/notion-timesession');
    if (!res.ok) { loadSessionsFromLocal(); return; }
    const ns = await res.json();
    if (!Array.isArray(ns)||!ns.length) { loadSessionsFromLocal(); return; }
    sessions = ns
      .filter(s => s.netMin != null)
      .map(s => ({
        notionPageId:  s.notionPageId,
        items:         [{ name:s.itemName||'', sku:s.sku||'', category:s.category||'', id:s.squareItemId||'', pieces:s.pieces??null }],
        employee:      { name:s.employeeName||'', id:'' },
        totalMs:       (s.totalMin||0)*60000, clockedOutMs:(s.dedMin||0)*60000, netMs:(s.netMin||0)*60000,
        notes:         s.notes||'',
        timestamp:     s.stopTime||(s.date?s.date+'T12:00:00Z':new Date().toISOString()),
        startTime:     s.startTime||null, stopTime:s.stopTime||null,
        saved:true, error:null,
      }));
    renderLog();
  } catch(e) { loadSessionsFromLocal(); }
}
function loadSessionsFromLocal() {
  try { sessions = JSON.parse(localStorage.getItem('sts_sessions')||'[]'); } catch(e) { sessions=[]; }
  renderLog();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  buildBars(); loadConfig();
  const resumed = [false, false];

  for (let tid = 0; tid < NUM_TIMERS; tid++) {
    const local = localStorage.getItem(`sts_activeTimer_${tid}`);
    if (local) {
      try {
        const saved = JSON.parse(local);
        saved.notionPageId = saved.notionPageId || localStorage.getItem(`sts_notionPageId_${tid}`);
        resumeTimer(tid, saved); resumed[tid] = true;
      } catch(e) { localStorage.removeItem(`sts_activeTimer_${tid}`); }
    }
  }

  if (resumed.some(r => !r)) {
    try {
      const res = await fetch('/api/notion-timesession?active=true');
      if (res.ok) {
        const active = await res.json();
        const runningPageIds = new Set(T.filter(t => t.notionPageId).map(t => t.notionPageId));
        let slot = 0;
        for (const s of active) {
          if (s.notionPageId && runningPageIds.has(s.notionPageId)) continue;
          while (slot < NUM_TIMERS && (resumed[slot] || T[slot].running)) slot++;
          if (slot >= NUM_TIMERS) break;
          if (s.startTime) {
            resumeTimer(slot, { startTime: new Date(s.startTime).getTime(), items:[{ name:s.itemName||'', sku:s.sku||'', category:s.category||'', id:s.squareItemId||'', isParent:false }], employee:{ name:s.employeeName||'', id:'' }, notionPageId:s.notionPageId });
            resumed[slot] = true;
          }
        }
      }
    } catch(e) { console.warn('Notion active check failed:', e); }
  }

  loadSessionsFromNotion();
  await loadEmployees();
  if (CFG.sqToken) { setTimeout(() => { pollShifts(); setInterval(pollShifts, 45000); }, 5000); }
}
boot();

async function autoPreselectItem(tid, query) {
  if (!CFG.sqToken) {
    showToast('Set your Square token in timer settings first');
    return;
  }
  T[tid].selectedItems = [];
  renderSelectedItems(tid);
  checkReady(tid);

  $t(tid, 'search-input').value = query;
  $t(tid, 'spinner').classList.add('active');

  try {
    const searchData = await sq('/catalog/search', {
      method: 'POST',
      body: JSON.stringify({ object_types: ['ITEM'], query: { text_query: { keywords: [query] } }, limit: 20 }),
    });
    const found = searchData.objects || [];
    if (!found.length) { showToast('No Square items found for "' + query + '"'); return; }

    const fullData = await sq('/catalog/batch-retrieve', {
      method: 'POST',
      body: JSON.stringify({ object_ids: found.map(o => o.id) }),
    });
    const rows = [];
    (fullData.objects || []).forEach(obj => {
      const itemName   = obj.item_data?.name || 'Unnamed';
      const category   = obj.item_data?.category_name || '';
      const variations = obj.item_data?.variations || [];
      if (variations.length <= 1) {
        const v = variations[0]?.item_variation_data;
        rows.push({ id: variations[0]?.id || obj.id, name: itemName, sku: v?.sku || '',
          price: v?.price_money ? (v.price_money.amount / 100).toFixed(2) : null, category, isParent: false });
      } else {
        rows.push({ id: obj.id, name: itemName, category, isParent: true, variantCount: variations.length,
          variants: variations.map(v => ({ id: v.id, name: v.item_variation_data?.name || '',
            sku: v.item_variation_data?.sku || '',
            price: v.item_variation_data?.price_money ? (v.item_variation_data.price_money.amount / 100).toFixed(2) : null })) });
      }
    });

    if (!rows.length) { showToast('No Square items found for "' + query + '"'); return; }

    const lq   = query.toLowerCase();
    const best = rows.find(r => r.name.toLowerCase() === lq)
              || rows.find(r => r.name.toLowerCase().includes(lq))
              || rows[0];

    selectItem(tid, best);
    $t(tid, 'search-input').value = '';
    showToast('✓ ' + best.name + ' selected from Square');
  } catch (e) {
    showToast('Search failed: ' + (e.message || e));
    console.warn('autoPreselectItem error:', e);
  } finally {
    $t(tid, 'spinner').classList.remove('active');
  }
}
</script>
</body>
</html>
